<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lead Sheet Editor</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f2e9">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lead Sheets">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Kalam:wght@400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Petaluma Script';
    src: url('https://raw.githubusercontent.com/steinbergmedia/petaluma/master/redist/otf/PetalumaScript.otf') format('opentype');
    font-display: swap;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --shell-bg:#e5e1d4;
    --header-bg:#fbfaf6;
    --header-fg:#2b2018;
    --header-sub:#8a8480;
    --accent:#8a3b2c;
    --paper:#fefdfa;
    --card:#fefdfa;
    --chrome:#ffffff;
    --card-border:#e4e0d3;
    --ink:#2b2018;
    --ink-soft:#8a8480;
    --pen:#8a3b2c;
    --danger:#a6392c;
    --ui-font: 'Kalam', 'Caveat', cursive;
    --title-font: 'EB Garamond', 'Lora', Georgia, serif;
    --chord-font: 'Petaluma Script', 'EB Garamond', 'Lora', cursive;
    --bar-w: 90px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--chord-font);
    background:var(--shell-bg);
    display:flex;
    justify-content:center;
    overflow:hidden;
  }
  #app{
    width:100%;
    max-width:430px;
    height:100vh;
    height:100dvh;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:0 0 24px rgba(0,0,0,.18);
  }
  #app.hidden{ display:none; }

  .main-row{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    min-height:0;
  }

  @media (min-width:700px){
    body{ padding:0; }
    #app{ max-width:none; box-shadow:none; }
    .main-row{ flex-direction:row; }
  }
  @media (min-width:1100px){
    #app{ max-width:1400px; margin:0 auto; box-shadow:0 0 40px rgba(0,0,0,.10); }
    body{ padding:24px 0; }
    #app{ height:calc(100vh - 48px); height:calc(100dvh - 48px); border-radius:10px; overflow:hidden; }
  }

  /* ===== Header ===== */
  .topbar{
    background:var(--header-bg);
    color:var(--header-fg);
    flex:0 0 auto;
    padding:10px 14px 11px;
    font-family:var(--ui-font);
    display:flex;
    align-items:center;
    gap:8px;
    border-bottom:1px solid var(--card-border);
  }
  .topbar .back{color:var(--ink);font-size:15px;font-weight:700;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;gap:2px;}
  .topbar .titlewrap{flex:1 1 auto;text-align:center;min-width:0;cursor:pointer;}
  .topbar .title{font-family:var(--title-font);font-style:italic;font-weight:700;font-size:18px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .sub{font-family:var(--ui-font);font-size:11px;color:var(--header-sub);margin-top:1px;}
  .topbar .icon{color:var(--ink);flex:0 0 auto;padding:3px 5px;cursor:pointer;display:flex;align-items:center;}
  .topbar .icon svg{width:19px;height:19px;}

  /* ===== Chart scroll area ===== */
  .chart-scroll{
    flex:1 1 auto;
    min-width:0;
    min-height:0;
    overflow-y:auto;
    overflow-x:auto;
    padding:14px 0 90px;
    -webkit-overflow-scrolling:touch;
    background:var(--shell-bg);
  }
  .chart-card{
    background:#ffffff;
    border:none;
    border-radius:0;
    padding:16px 10px 16px 8px;
    position:relative;
    box-shadow:none;
  }
  @media (min-width:700px){
    .chart-scroll{ padding:40px 24px 110px; }
    .chart-card{
      max-width:794px;
      margin:0 auto;
      padding:44px 40px;
      border:1px solid var(--card-border);
      border-radius:2px;
      box-shadow:0 2px 16px rgba(43,32,24,.14);
    }
  }
  .sheet-title{
    text-align:center;
    font-family:var(--title-font);
    font-style:italic;
    font-size:23px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:2px;
    cursor:pointer;
    letter-spacing:.2px;
  }
  .sheet-composer{
    text-align:center;
    font-family:var(--ui-font);
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:10px;
    cursor:pointer;
  }
  #chartInner{ position:relative; }
  #inkCanvas{
    position:absolute;
    top:0; left:0;
    pointer-events:none;
    touch-action:none;
  }
  .chart-scroll.draw-mode #inkCanvas,
  .chart-scroll.erase-mode #inkCanvas{
    pointer-events:auto;
  }

  .write-lane{ height:26px; display:flex; align-items:flex-end; }
  .feel-label{
    font-family:var(--ui-font);
    font-style:italic;
    font-size:12px;
    color:var(--ink-soft);
    padding-left:13px;
    margin-bottom:1px;
  }

  .label-row{
    display:flex;
    align-items:flex-end;
    min-height:15px;
  }
  .label-row .ts-spacer{ flex:0 0 11px; }
  .label-row .bar-spacer{ flex:0 0 var(--bar-w); }
  .label-slot{
    flex:0 0 auto;
    min-width:13px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .sec-badge{
    background:var(--ink);
    color:#fff;
    font-family:Helvetica,Arial,sans-serif;
    font-weight:bold;
    font-size:10px;
    padding:1px 5px;
    border-radius:2px;
    margin-bottom:2px;
    white-space:nowrap;
  }

  .bar-row{
    display:flex;
    align-items:stretch;
    margin-bottom:5px;
  }

  .time-sig{
    flex:0 0 11px;
    min-width:0;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    justify-content:center;
    line-height:.85;
    cursor:pointer;
    margin-right:0;
    padding-right:0.5px;
    overflow:visible;
  }
  .time-sig .num,.time-sig .den{
    font-size:23px;
    font-weight:bold;
    color:var(--ink);
    font-family:var(--chord-font);
    display:inline-block;
    transform:scaleX(0.5);
    transform-origin:right center;
  }

  .bar{
    flex:0 1 var(--bar-w);
    min-width:56px;
    min-height:56px;
    margin:2px 0;
    padding:5px 4px 3px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    align-items:stretch;
    cursor:pointer;
    position:relative;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  .bar .slot{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    min-width:0;
    min-height:46px;
    touch-action:pan-y;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  .bar .slot.drop-target{
    background:#f3e9e5;
    border-radius:4px;
    outline:2px dashed var(--pen);
    outline-offset:-2px;
  }
  .bar .slot.drag-source{
    opacity:.35;
  }
  .chart-scroll.dragging-chord,
  .chart-scroll.dragging-chord *{
    user-select:none;
    -webkit-user-select:none;
  }
  .bar .chord{
    font-size:21px;
    color:var(--ink);
    line-height:1;
    white-space:nowrap;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  .bar .chord.dense{
    font-size:18px;
    display:inline-block;
    transform:scaleX(0.7);
    transform-origin:left center;
  }
  .bar .chord .suf{
    font-size:.62em;
    vertical-align:top;
    position:relative;
    top:1px;
    margin-left:1px;
  }
  .bar .chord .acc{
    font-size:.72em;
    margin-left:-1px;
    position:relative;
    top:-1px;
  }
  .bar .chord.dense .acc{
    margin-left:1px;
  }
  .bar .empty-hint{
    grid-column:1/-1;
    font-family:Helvetica,Arial,sans-serif;
    font-size:10px;
    color:#c7c3b7;
    margin:0 auto;
  }
  .bar .bar-glyph{
    grid-column:1/-1;
    font-size:22px;
    font-weight:bold;
    color:var(--ink);
    margin:0 auto;
  }
  .bar .add-chord{
    position:absolute;
    right:2px; bottom:1px;
    width:13px;height:13px;
    border-radius:50%;
    background:#eef1f6;
    border:1px solid #c7d3e6;
    color:#3a6fc4;
    font-family:Helvetica,Arial,sans-serif;
    font-size:9px;
    display:flex;align-items:center;justify-content:center;
    line-height:1;
    pointer-events:none;
  }

  .add-bar{
    flex:0 0 48px;
    min-height:56px;
    margin:2px 2px;
    border:1.5px dashed #c7c3b7;
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    color:#a8a49a;
    font-family:Helvetica,Arial,sans-serif;
    font-size:20px;
    cursor:pointer;
  }

  /* ===== Border lines (tappable barlines) ===== */
  .border-line{
    flex:0 0 auto;
    min-width:13px;
    display:flex;
    align-items:stretch;
    justify-content:center;
    gap:2px;
    cursor:pointer;
    margin:2px 0;
  }
  .border-line .ln-thin{ width:1.6px; background:var(--ink); align-self:stretch; }
  .border-line .ln-thick{ width:3.5px; background:var(--ink); align-self:stretch; }
  .border-line .dots{ display:flex; flex-direction:column; justify-content:center; gap:2px; }
  .border-line .dots span{ width:3.5px;height:3.5px;border-radius:50%;background:var(--ink);display:block; }

  /* ===== Toolbar (phone: bottom bar / tablet+: left sidebar) ===== */
  .toolbar{
    flex:0 0 auto;
    background:var(--header-bg);
    border-top:1px solid var(--card-border);
    display:flex;
    gap:4px;
    padding:8px 8px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .sidebar{
    display:none;
    flex:0 0 auto;
    width:84px;
    background:var(--header-bg);
    border-right:1px solid var(--card-border);
    flex-direction:column;
    gap:4px;
    padding:14px 8px;
    overflow-y:auto;
  }
  @media (min-width:700px){
    .toolbar{ display:none; }
    .sidebar{ display:flex; }
  }
  .tbtn{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    font-family:var(--ui-font);
    font-size:11.5px;
    font-weight:700;
    color:var(--ink);
    background:var(--chrome);
    border:1px solid var(--card-border);
    padding:8px 12px 7px;
    border-radius:12px;
    white-space:nowrap;
    cursor:pointer;
  }
  .sidebar .tbtn{ width:100%; padding:10px 6px 9px; }
  .tbtn svg{ width:19px; height:19px; }
  .tbtn:hover{ background:#f2efe6; }
  .tbtn.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .tbtn.active:hover{ background:#3a2c20; }
  .tbtn.warn{ color:var(--danger); }

  /* ===== Desktop info panel ===== */
  .info-panel{
    display:none;
    flex:0 0 auto;
    width:220px;
    background:var(--header-bg);
    border-left:1px solid var(--card-border);
    padding:18px 16px;
    overflow-y:auto;
    font-family:var(--ui-font);
  }
  @media (min-width:1100px){
    .info-panel{ display:block; }
  }
  .info-panel h4{
    margin:0 0 10px;
    font-family:var(--ui-font);
    font-size:11px;
    font-weight:700;
    letter-spacing:.6px;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  .info-panel .info-row{ margin-bottom:16px; }
  .info-panel .info-line{
    font-size:14px;
    color:var(--ink);
    padding:3px 0;
  }
  .info-panel .section-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:5px 0;
    font-size:13.5px;
    color:var(--ink);
  }
  .info-panel .section-badge{
    background:var(--ink);
    color:var(--paper);
    font-family:Helvetica,Arial,sans-serif;
    font-weight:bold;
    font-size:10px;
    padding:1px 6px;
    border-radius:2px;
    flex:0 0 auto;
  }
  .info-panel .section-range{ color:var(--ink-soft); }

  /* ===== Toast ===== */
  #toast{
    position:absolute;
    top:60px; left:50%;
    transform:translateX(-50%);
    background:rgba(43,32,24,.94);
    color:#fdfcf8;
    font-family:var(--ui-font);
    font-weight:700;
    font-size:12.5px;
    padding:9px 14px;
    border-radius:20px;
    display:none;
    z-index:40;
    max-width:85%;
    text-align:center;
  }
  #toast.show{display:block;}

  /* ===== Bottom sheet ===== */
  #backdrop{
    position:absolute; inset:0;
    background:rgba(0,0,0,.35);
    opacity:0; pointer-events:none;
    transition:opacity .18s ease;
    z-index:50;
  }
  #backdrop.open{opacity:1;pointer-events:auto;}
  #sheet{
    position:absolute;
    left:0; right:0; bottom:0;
    background:var(--chrome);
    border-radius:16px 16px 0 0;
    padding:14px 16px 22px;
    transform:translateY(100%);
    transition:transform .22s ease;
    z-index:51;
    font-family:var(--ui-font);
    max-height:75%;
    overflow-y:auto;
  }
  #sheet.open{transform:translateY(0);}
  .sheet-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:12px;
  }
  .sheet-header span{font-family:var(--title-font);font-style:italic;font-size:17px;font-weight:700;color:var(--ink);}
  .sheet-header button{
    background:none;border:none;font-size:16px;color:var(--ink-soft);cursor:pointer;padding:4px 6px;
  }
  .sheet-subhead{
    font-family:var(--ui-font);
    font-size:12px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;
    letter-spacing:.3px;margin:16px 0 8px;
  }
  .sheet-body-text{
    font-size:13px;color:var(--ink-soft);margin-bottom:14px;line-height:1.4;
  }
  .root-grid,.quality-grid,.symbol-grid,.timesig-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .root-grid button,.quality-grid button,.symbol-grid button,.timesig-grid button{
    padding:12px 4px;
    border-radius:8px;
    border:1px solid var(--card-border);
    background:var(--paper);
    font-family:var(--chord-font);
    font-size:16px;
    color:var(--ink);
    cursor:pointer;
  }
  .quality-grid button{font-family:var(--ui-font);font-size:12.5px;font-weight:700;}
  .symbol-grid{grid-template-columns:repeat(1,1fr);}
  .symbol-grid button{font-family:var(--ui-font);font-weight:700;font-size:14px;padding:14px 6px;text-align:left;}
  .wholebar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .icon-btn{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;}
  .timesig-grid button{font-family:var(--ui-font);font-size:14px;font-weight:700;}
  .sheet-actions{margin-top:14px;display:flex;gap:8px;}
  .sheet-actions button{
    flex:1;
    padding:11px;
    border-radius:8px;
    border:none;
    font-family:var(--ui-font);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }
  .sheet-actions button.primary{ background:var(--ink); color:var(--paper); }
  .sheet-actions button.neutral{ background:#f0eee7; color:var(--ink-soft); }
  .sheet-actions button.danger{ background:#f7e9e6; color:var(--danger); }
  .title-edit input{
    width:100%;padding:10px;font-size:15px;border:1px solid var(--card-border);border-radius:8px;font-family:var(--ui-font);color:var(--ink);
  }

  /* ===== Welcome screen ===== */
  #welcomeScreen{
    width:100%;
    height:100vh;
    height:100dvh;
    background:var(--shell-bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  #welcomeScreen.hidden{ display:none; }
  .welcome-card{
    width:100%;
    max-width:360px;
    background:var(--chrome);
    border-radius:16px;
    padding:40px 30px 32px;
    box-shadow:0 8px 32px rgba(43,32,24,.14);
    text-align:center;
  }
  .welcome-card .app-glyph{ width:38px; height:38px; margin:0 auto 14px; color:var(--ink); }
  .welcome-card h1{
    font-family:var(--title-font);
    font-style:italic;
    font-weight:700;
    font-size:26px;
    color:var(--ink);
    margin:0 0 28px;
  }
  .welcome-field{
    text-align:left;
    margin-bottom:20px;
  }
  .welcome-field input{
    width:100%;
    border:none;
    border-bottom:1px solid var(--card-border);
    background:transparent;
    padding:6px 2px 8px;
    font-family:var(--ui-font);
    font-size:14.5px;
    color:var(--ink);
  }
  .welcome-field input::placeholder{ color:var(--ink-soft); }
  .welcome-field input:focus{ outline:none; border-bottom-color:var(--ink); }
  .welcome-signin{
    width:100%;
    background:none;
    border:none;
    font-family:var(--title-font);
    font-weight:700;
    font-size:15px;
    color:var(--ink);
    padding:10px 0 22px;
    cursor:pointer;
  }
  .welcome-divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
    color:var(--ink-soft);
    font-family:var(--ui-font);
    font-size:12px;
    font-style:italic;
  }
  .welcome-divider .ln{ flex:1 1 auto; height:1px; background:var(--card-border); }
  .welcome-guest{
    width:100%;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:9px;
    padding:14px;
    font-family:var(--ui-font);
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
  }
  .welcome-guest:hover{ background:#3a2c20; }
  .welcome-msg{
    margin-top:14px;
    min-height:14px;
    font-family:var(--ui-font);
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
  }

  @media print{
    html, body{ height:auto !important; overflow:visible !important; background:#fff; }
    #app{ box-shadow:none; max-width:none; height:auto !important; overflow:visible !important; }
    .topbar, .toolbar, .sidebar, .info-panel, #toast, #backdrop, #sheet{ display:none !important; }
    .chart-scroll{ overflow:visible !important; padding:0; height:auto !important; }
    .chart-card{ border:none; box-shadow:none; max-width:none; margin:0; min-height:auto !important; }
    .add-bar, .empty-hint{ display:none !important; }
  }
  body.exporting .add-bar,
  body.exporting .empty-hint{
    display:none !important;
  }
</style>
</head>
<body>

<div id="welcomeScreen">
  <div class="welcome-card">
    <div class="app-glyph" id="welcomeGlyph"></div>
    <h1>Lead Sheet Editor</h1>
    <div class="welcome-field"><input type="email" id="welcomeEmail" placeholder="Email" autocomplete="email"></div>
    <div class="welcome-field"><input type="password" id="welcomePassword" placeholder="Password" autocomplete="current-password"></div>
    <button class="welcome-signin" onclick="attemptSignIn()">Sign In</button>
    <div class="welcome-divider"><span class="ln"></span><span>or</span><span class="ln"></span></div>
    <button class="welcome-guest" onclick="continueAsGuest()">Continue as Guest</button>
    <div class="welcome-msg" id="welcomeMsg"></div>
  </div>
</div>

<div id="app" class="hidden">

  <div class="topbar">
    <div class="back" onclick="showWelcome()" id="backIcon"></div>
    <div class="titlewrap" onclick="openTitleEdit()">
      <div class="title" id="titleText">Autumn Leaves</div>
      <div class="sub" id="subText">4/4 · G minor</div>
    </div>
    <div class="icon" onclick="toggleMode('draw')" id="topDrawIcon"></div>
    <div class="icon" onclick="clearInk()" id="topClearIcon"></div>
    <div class="icon" onclick="undo()" id="topUndoIcon"></div>
  </div>

  <div class="main-row">
    <div class="sidebar" id="sidebarToolbar"></div>

    <div class="chart-scroll" id="chartScroll">
      <div class="chart-card">
        <div class="sheet-title" id="sheetTitleText" onclick="openTitleEdit()">Autumn Leaves</div>
        <div class="sheet-composer" id="sheetComposerText" onclick="openTitleEdit()" style="display:none;"></div>

</div>

<script>
/* ============ Data ============ */
const ROOTS = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const QUALITIES = [
  {id:'maj',  label:'Major',  suffix:'',     sup:false},
  {id:'m',    label:'Minor',  suffix:'−',    sup:false},
  {id:'7',    label:'7',      suffix:'7',    sup:true},
  {id:'maj7', label:'Maj7',   suffix:'Δ7',   sup:true},
  {id:'m7',   label:'Min7',   suffix:'−7',   sup:true},
  {id:'dim',  label:'Dim',    suffix:'°',    sup:true},
  {id:'sus4', label:'Sus4',   suffix:'sus4', sup:true},
  {id:'add9', label:'Add9',   suffix:'add9', sup:true},
  {id:'m7b5', label:'Min7♭5',suffix:'ø7',   sup:true},
  {id:'aug',  label:'Aug',    suffix:'+',    sup:true},
];
const TIME_SIGS = [[4,4],[3,4],[2,4],[6,8],[9,8],[12,8],[5,4],[7,8]];
const SECTION_LETTERS = ['A','B','C','D','E','F','G','H'];
const NAMED_SECTIONS = ['Verse','Pre-Chorus','Chorus','Interlude','Solo'];
const MAX_CHORDS_PER_BAR = 4;
const FONT_OPTIONS = [
  {id:'lora', label:'Classic', sample:'Db7', family:"'Lora', Georgia, 'Times New Roman', serif"},
  {id:'petaluma', label:'Copyist', sample:'Db7', family:"'Petaluma Script', 'Lora', cursive"},
  {id:'caveat', label:'Handwritten', sample:'Db7', family:"'Caveat', 'Lora', cursive"},
];
let BARS_PER_ROW = 4;

/* ============ Hand-drawn line icons ============ */
const ICON_PATHS = {
  cursor: '<path d="M5 3l6.5 16 2-6.3 6.3-2z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>',
  pencil: '<path d="M4 20l0.8-4L14.5 6.3l3.2 3.2L8 19.2 4 20z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><path d="M13 7.8l3.2 3.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>',
  eraser: '<g transform="rotate(-35 12 12)"><rect x="6" y="8.5" width="12" height="7" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="6" y1="13" x2="18" y2="13" stroke="currentColor" stroke-width="1.6"/></g>',
  undo: '<path d="M7.5 7.5L3.3 11.7l4.2 4.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.3 11.7h10.4a6.3 6.3 0 1 1 0 12.6h-1.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',
  droplet: '<path d="M12 3.2s6.3 7.4 6.3 11.8a6.3 6.3 0 1 1-12.6 0C5.7 10.6 12 3.2 12 3.2z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  rhythm: '<ellipse cx="7" cy="18.2" rx="2.3" ry="1.7" fill="currentColor"/><ellipse cx="15.5" cy="15.6" rx="2.3" ry="1.7" fill="currentColor"/><line x1="9.2" y1="18.2" x2="9.2" y2="5" stroke="currentColor" stroke-width="1.4"/><line x1="17.7" y1="15.6" x2="17.7" y2="5.4" stroke="currentColor" stroke-width="1.4"/><path d="M9.2 5l8.5 0.4" fill="none" stroke="currentColor" stroke-width="1.4"/>',
  page: '<path d="M6.5 3.5h7l4 4v13h-11z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13.5 3.5v4h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>',
  export: '<path d="M12 3.3v11.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M7.8 7.5L12 3.3l4.2 4.2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.3 15v3.7a2 2 0 0 0 2 2h11.4a2 2 0 0 0 2-2V15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',
  chevron: '<path d="M15.5 4.5l-8 7.5 8 7.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
  staffPen: '<line x1="3" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.1"/><line x1="3" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.1"/><line x1="3" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1.1"/><line x1="3" y1="17" x2="15" y2="17" stroke="currentColor" stroke-width="1.1"/><line x1="3" y1="20" x2="15" y2="20" stroke="currentColor" stroke-width="1.1"/><path d="M11 18.5L20.5 6.3a1.4 1.4 0 0 1 2.2 1.7L14 20.5l-3.3.8z" fill="currentColor"/><circle cx="9.5" cy="19.5" r="1" fill="currentColor"/>',
};
function svgIcon(name, size){
  size = size || 19;
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}">${ICON_PATHS[name]||''}</svg>`;
}

/* ============ Toolbar (shared between bottom bar + sidebar) ============ */
const TOOLBAR_BUTTONS = [
  {mode:'chords', label:'Edit',       icon:'cursor'},
  {mode:'draw',   label:'Draw',       icon:'pencil'},
  {mode:'erase',  label:'Erase',      icon:'eraser'},
  {action:'undo',       label:'Undo',       icon:'undo'},
  {action:'clearInk',   label:'Clear Ink',  icon:'droplet'},
  {action:'font',       label:'Font',       icon:null, text:'Aa'},
  {action:'rhythm',     label:'Rhythm',     icon:'rhythm'},
  {action:'clearPage',  label:'Clear Page', icon:'page', warn:true},
  {action:'export',     label:'Export',     icon:'export'},
];
function toolbarButtonHtml(btn){
  const dataAttr = btn.mode ? `data-tb-mode="${btn.mode}"` : `data-tb-action="${btn.action}"`;
  const inner = btn.icon ? svgIcon(btn.icon) : `<span style="font-family:var(--title-font);font-style:italic;font-weight:700;font-size:16px;line-height:1;">${btn.text}</span>`;
  const cls = 'tbtn' + (btn.warn ? ' warn' : '');
  return `<button class="${cls}" ${dataAttr}>${inner}<span>${btn.label}</span></button>`;
}
function renderToolbars(){
  const html = TOOLBAR_BUTTONS.map(toolbarButtonHtml).join('');
  document.getElementById('bottomToolbar').innerHTML = html;
  document.getElementById('sidebarToolbar').innerHTML = html;
  [document.getElementById('bottomToolbar'), document.getElementById('sidebarToolbar')].forEach(container=>{
    container.addEventListener('click', onToolbarClick);
  });
  syncModeButtons();
}
function onToolbarClick(e){
  const btn = e.target.closest('.tbtn');
  if(!btn) return;
  if(btn.dataset.tbMode){ toggleMode(btn.dataset.tbMode); return; }
  const action = btn.dataset.tbAction;
  if(action==='undo') undo();
  else if(action==='clearInk') clearInk();
  else if(action==='font') openFontPicker();
  else if(action==='rhythm') showToast('Rhythm — coming soon');
  else if(action==='clearPage') confirmClearPage();
  else if(action==='export') openExportSheet();
}
function syncModeButtons(){
  document.querySelectorAll('.tbtn[data-tb-mode]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tbMode===mode);
  });
}

let idCounter = 1;
const genId = () => 'id' + (idCounter++);

function bar(chords){ return {type:'bar', id:genId(), kind:'chords', chords: chords||[]}; }

// Default beat layout (0-indexed, 4 beats per bar) for a given chord count.
// 1 chord: |X   |   2 chords: |X X |   3 chords: |XXX |   4 chords: |XXXX|
function defaultBeats(n){
  if(n<=0) return [];
  if(n===1) return [0];
  if(n===2) return [0,2];
  if(n===3) return [0,1,2];
  return [0,1,2,3];
}
function reflowBeats(b){
  const positions = defaultBeats(b.chords.length);
  const sorted = b.chords.slice().sort((x,y)=>x.beat-y.beat);
  sorted.forEach((c,i)=>{ c.beat = positions[i]; });
}
function addChordWithReflow(b, newChordPartial){
  const positions = defaultBeats(b.chords.length + 1);
  const sorted = b.chords.slice().sort((x,y)=>x.beat-y.beat);
  sorted.forEach((c,i)=>{ c.beat = positions[i]; });
  newChordPartial.beat = positions[positions.length-1];
  b.chords.push(newChordPartial);
}

function blankSong(){
  return {
    title:'My Song',
    composer:'',
    key:'',
    feel:'',
    timeSig:{num:4, den:4},
    items:[ bar([]) ],
    borders:[ {type:'normal', label:null}, {type:'end', label:null} ]
  };
}

function defaultDemoSong(){
  const c1 = (r,q)=>({root:r, quality:q});
  const items = [
    bar([c1('C','m7')]),                              // 1
    bar([c1('F','7')]),                                // 2
    bar([c1('Bb','maj7')]),                            // 3
    bar([c1('Eb','maj7')]),                             // 4
    bar([c1('A','m7b5')]),                             // 5
    bar([c1('D','7')]),                                // 6
    bar([c1('G','m')]),                                // 7
    (()=>{ const b=bar([]); b.kind='repeat'; return b; })(), // 8 (%)
    bar([c1('A','m7b5')]),                             // 9
    bar([c1('D','7')]),                                // 10
    bar([c1('G','m')]),                                // 11
    (()=>{ const b=bar([]); b.kind='repeat'; return b; })(), // 12 (%)
    bar([c1('C','m7')]),                               // 13
    bar([c1('F','7')]),                                // 14
    bar([c1('Bb','maj7')]),                            // 15
    bar([c1('Eb','maj7')]),                            // 16
    bar([c1('A','m7b5')]),                             // 17
    bar([c1('D','7')]),                                // 18
    bar([{root:'G',quality:'m7',beat:0},{root:'Gb',quality:'m7',beat:2}]), // 19
    bar([{root:'F',quality:'m7',beat:0},{root:'E',quality:'7',beat:2}]),   // 20
    bar([c1('A','m7b5')]),                             // 21
    bar([c1('D','7')]),                                // 22
    bar([c1('G','m')]),                                // 23
    (()=>{ const b=bar([]); b.kind='repeat'; return b; })(), // 24 (%)
  ];
  // give single-chord bars an explicit beat 0 (addChordWithReflow isn't used here; set directly)
  items.forEach(it=>{
    if(it.kind==='chords' && it.chords.length===1 && it.chords[0].beat===undefined){
      it.chords[0].beat = 0;
    }
  });
  const borders = items.map(()=>({type:'normal', label:null}));
  borders.push({type:'normal', label:null}); // trailing, will be set to 'end' below
  borders[0].label = 'A';
  borders[8].label = 'B';
  borders[16].label = 'C';
  borders[borders.length-1].type = 'end';
  return {
    title:'Autumn Leaves',
    composer:'Joseph Kosma',
    key:'G minor',
    feel:'Medium Swing',
    timeSig:{num:4, den:4},
    items,
    borders
  };
}

// song.items is a flat list of bars.
// song.borders[i] = {type, label} is the border BEFORE items[i];
// song.borders[items.length] is the trailing (final) border.
let song = defaultDemoSong();

/* ============ Undo stack ============ */
let undoStack = [];
function snapshotSongStr(){ return JSON.stringify(song); }
function pushSongUndo(){
  undoStack.push({type:'song', data:snapshotSongStr()});
  if(undoStack.length>60) undoStack.shift();
}
function pushInkUndo(){
  const canvas = document.getElementById('inkCanvas');
  if(canvas.width>0 && canvas.height>0){
    undoStack.push({type:'ink', data:canvas.toDataURL(), w:canvas.width, h:canvas.height});
    if(undoStack.length>60) undoStack.shift();
  }
}
function pushFullUndo(){
  const canvas = document.getElementById('inkCanvas');
  undoStack.push({
    type:'full',
    songData: snapshotSongStr(),
    inkData: canvas.width>0 ? canvas.toDataURL() : null,
    w:canvas.width, h:canvas.height
  });
  if(undoStack.length>60) undoStack.shift();
}
function restoreInkFromDataUrl(dataUrl, w, h){
  const canvas = document.getElementById('inkCanvas');
  const ctx = canvas.getContext('2d');
  if(!dataUrl){
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.restore();
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return;
  }
  const img = new Image();
  img.onload = ()=>{
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,w,h,0,0,canvas.width,canvas.height);
    ctx.restore();
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  };
  img.src = dataUrl;
}
function undo(){
  const entry = undoStack.pop();
  if(!entry){ showToast('Nothing to undo'); return; }
  if(entry.type==='song'){
    song = JSON.parse(entry.data);
    updateHeader();
    syncTitleDisplay();
    render();
  } else if(entry.type==='ink'){
    restoreInkFromDataUrl(entry.data, entry.w, entry.h);
  } else if(entry.type==='full'){
    song = JSON.parse(entry.songData);
    updateHeader();
    syncTitleDisplay();
    render();
    requestAnimationFrame(()=>restoreInkFromDataUrl(entry.inkData, entry.w, entry.h));
  }
}

/* ============ Helpers ============ */
function rootHtml(r){
  if(r.length===2 && r[1]==='b') return r[0]+'<span class="acc">♭</span>';
  return r;
}
function qualityById(id){ return QUALITIES.find(q=>q.id===id) || QUALITIES[0]; }
function wholeRestSvg(w){
  w = w||22;
  return `<svg width="${w}" height="16" viewBox="0 0 22 16" style="display:block;"><line x1="0" y1="4" x2="22" y2="4" stroke="#2b2018" stroke-width="1.6"/><rect x="3" y="4" width="13" height="6" fill="#2b2018"/></svg>`;
}
function halfRestSvg(w){
  w = w||22;
  return `<svg width="${w}" height="16" viewBox="0 0 22 16" style="display:block;"><line x1="0" y1="10" x2="22" y2="10" stroke="#2b2018" stroke-width="1.6"/><rect x="3" y="4" width="13" height="6" fill="#2b2018"/></svg>`;
}
function findBarById(id){ return song.items.find(it=>it.id===id) || null; }
function updateHeader(){
  const sub = song.key ? `${song.timeSig.num}/${song.timeSig.den} · ${song.key}` : `${song.timeSig.num}/${song.timeSig.den}`;
  document.getElementById('subText').textContent = sub;
}
function syncTitleDisplay(){
  document.getElementById('titleText').textContent = song.title;
  document.getElementById('sheetTitleText').textContent = song.title;
  const cEl = document.getElementById('sheetComposerText');
  if(song.composer){
    cEl.textContent = song.composer;
    cEl.style.display='block';
  } else {
    cEl.textContent='';
    cEl.style.display='none';
  }
}

/* ============ Desktop info panel ============ */
function computeSections(){
  const sections=[];
  for(let i=0;i<song.borders.length-1;i++){
    const b = song.borders[i];
    if(b && b.label){
      let end = song.items.length;
      for(let j=i+1;j<song.borders.length;j++){
        if(song.borders[j] && song.borders[j].label){ end=j; break; }
      }
      sections.push({label:b.label, from:i+1, to:end});
    }
  }
  return sections;
}
function renderInfoPanel(){
  const panel = document.getElementById('infoPanel');
  if(!panel) return;
  const sections = computeSections();
  const infoLines = [
    song.title,
    [song.timeSig.num+'/'+song.timeSig.den, song.key].filter(Boolean).join(' · '),
    song.feel || ''
  ].filter(Boolean);
  panel.innerHTML = `
    <div class="info-row">
      <h4>Song Info</h4>
      ${infoLines.map(l=>`<div class="info-line">${l}</div>`).join('')}
    </div>
    ${sections.length ? `<div class="info-row">
      <h4>Sections</h4>
      ${sections.map(s=>`<div class="section-item"><span class="section-badge">${s.label}</span><span class="section-range">bars ${s.from}-${s.to}</span></div>`).join('')}
    </div>` : ''}
  `;
}

/* ============ Mode state ============ */
let mode = 'chords'; // chords | draw | erase

function toggleMode(m){
  mode = (mode===m) ? 'chords' : m;
  syncModeButtons();
  const scroll = document.getElementById('chartScroll');
  scroll.classList.toggle('draw-mode', mode==='draw');
  scroll.classList.toggle('erase-mode', mode==='erase');
}

/* ============ Toast ============ */
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ============ Title edit ============ */
function openTitleEdit(){
  showSheet(`
    <div class="sheet-header"><span>Song info</span><button onclick="closeSheet()">✕</button></div>
    <div class="sheet-subhead" style="margin-top:0;">Title</div>
    <div class="title-edit"><input id="titleInput" placeholder="Song title" value="${song.title.replace(/"/g,'&quot;')}"></div>
    <div class="sheet-subhead">Composer</div>
    <div class="title-edit"><input id="composerInput" placeholder="Optional" value="${(song.composer||'').replace(/"/g,'&quot;')}"></div>
    <div class="sheet-subhead">Feel</div>
    <div class="title-edit"><input id="feelInput" placeholder="e.g. Medium Swing" value="${(song.feel||'').replace(/"/g,'&quot;')}"></div>
    <div class="sheet-actions"><button class="primary" onclick="saveTitle()">Save</button></div>
  `);
}
function saveTitle(){
  const v = document.getElementById('titleInput').value.trim();
  const c = document.getElementById('composerInput').value.trim();
  const f = document.getElementById('feelInput').value.trim();
  if(v){
    pushSongUndo();
    song.title=v;
    song.composer=c;
    song.feel=f;
    syncTitleDisplay();
    renderInfoPanel();
  }
  closeSheet();
}

/* ============ Export / Import ============ */
function slugify(name){
  return (name||'lead-sheet').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'lead-sheet';
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function openExportSheet(){
  showSheet(`
    <div class="sheet-header"><span>Export</span><button onclick="closeSheet()">✕</button></div>
    <div class="symbol-grid">
      <button onclick="exportPNG()">Save as Image (PNG)</button>
      <button onclick="exportPDF()">Save as PDF</button>
      <button onclick="exportJSON()">Export Chart Data (.json)</button>
      <button onclick="triggerImportJSON()">Import Chart Data (.json)</button>
    </div>
    <div class="sheet-body-text" style="margin-top:14px;">PNG and PDF save exactly what's on the chart, including your handwriting. The .json file is this chart's raw data — export it to back it up or send it to someone else using this app, then use Import to load it back in.</div>
  `);
}
function exportPNG(){
  if(typeof html2canvas === 'undefined'){
    showToast('Image export needs an internet connection');
    return;
  }
  closeSheet();
  showToast('Preparing image…');
  document.body.classList.add('exporting');
  const card = document.querySelector('.chart-card');
  requestAnimationFrame(()=>{
    html2canvas(card, {backgroundColor:'#ffffff', scale:2}).then(canvas=>{
      canvas.toBlob(blob=>{
        downloadBlob(blob, slugify(song.title)+'.png');
      });
    }).catch(()=>{
      showToast('Image export failed');
    }).finally(()=>{
      document.body.classList.remove('exporting');
    });
  });
}
function exportPDF(){
  closeSheet();
  window.print();
}
function exportJSON(){
  const data = JSON.stringify(song, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  downloadBlob(blob, slugify(song.title)+'.json');
  closeSheet();
}
function triggerImportJSON(){
  document.getElementById('importFileInput').click();
}
function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.items) || !Array.isArray(parsed.borders)){
        showToast('That file does not look like a chart export');
        return;
      }
      pushSongUndo();
      song = parsed;
      if(!song.timeSig) song.timeSig = {num:4, den:4};
      if(typeof song.key !== 'string') song.key = '';
      if(typeof song.title !== 'string') song.title = 'My Song';
      if(typeof song.composer !== 'string') song.composer = '';
      if(typeof song.feel !== 'string') song.feel = '';
      syncTitleDisplay();
      updateHeader();
      closeSheet();
      render();
      showToast('Chart imported');
    } catch(err){
      showToast('Could not read that file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ============ Time signature ============ */
function openTimeSigEdit(){
  showSheet(`
    <div class="sheet-header"><span>Time signature</span><button onclick="closeSheet()">✕</button></div>
    <div class="timesig-grid">
      ${TIME_SIGS.map(([n,d])=>`<button onclick="setTimeSig(${n},${d})">${n}/${d}</button>`).join('')}
    </div>
  `);
}
function setTimeSig(n,d){
  pushSongUndo();
  song.timeSig = {num:n, den:d};
  updateHeader();
  closeSheet();
  render();
}

/* ============ Font picker ============ */
let currentFontId = 'petaluma';
function openFontPicker(){
  showSheet(`
    <div class="sheet-header"><span>Chord font</span><button onclick="closeSheet()">✕</button></div>
    <div class="symbol-grid">
      ${FONT_OPTIONS.map(f=>`
        <button style="display:flex;align-items:center;justify-content:space-between;${f.id===currentFontId?'border-color:var(--ink);background:#f2efe6;':''}" onclick="setChordFont('${f.id}')">
          <span>${f.label}${f.id===currentFontId ? ' ✓' : ''}</span>
          <span style="font-family:${f.family};font-size:20px;">${f.sample}</span>
        </button>
      `).join('')}
    </div>
    <div class="sheet-body-text" style="margin-top:14px;">Copyist and Handwritten need an internet connection the first time they load. Rest/rhythm symbols are drawn shapes and won't change with the font.</div>
  `);
}

/* ============ Responsive page & bar sizing ============ */
// Reads the actual page (.chart-card) width and picks how many bars fit per
// row (like text reflowing to the width of a page), then sizes the page
// itself like a sheet of A4 paper (fixed proportions, grows taller for long charts).
function applyResponsiveLayout(){
  const card = document.querySelector('.chart-card');
  if(!card) return;
  const cs = getComputedStyle(card);
  const contentW = card.clientWidth - parseFloat(cs.paddingLeft||0) - parseFloat(cs.paddingRight||0);
  if(contentW <= 0) return;

  card.style.minHeight = Math.round(card.clientWidth * Math.SQRT2) + 'px'; // A4 proportions (border-box)

  const TS_W = 11.5, BORDER_W = 13, MIN_BAR = 72, MAX_BAR = 170, MIN_N = 2, MAX_N = 8;
  const barWidthFor = n => (contentW - TS_W - (n+1)*BORDER_W) / n;
  let n = 4;
  if(barWidthFor(n) < MIN_BAR){
    while(n > MIN_N && barWidthFor(n) < MIN_BAR) n--;
  } else if(barWidthFor(n) > MAX_BAR){
    while(n < MAX_N && barWidthFor(n) > MAX_BAR) n++;
  }
  n = Math.max(MIN_N, Math.min(MAX_N, n));
  const bw = Math.round(Math.max(MIN_BAR, barWidthFor(n)));
  document.documentElement.style.setProperty('--bar-w', bw+'px');

  if(n !== BARS_PER_ROW){
    BARS_PER_ROW = n;
    render();
  }
}

/* ============ Rendering ============ */
function chunkRows(items, barsPerRow){
  barsPerRow = barsPerRow || BARS_PER_ROW;
  const rows=[];
  for(let i=0;i<items.length;i+=barsPerRow){
    rows.push(items.slice(i, i+barsPerRow));
  }
  if(rows.length===0) rows.push([]);
  return rows;
}

function chordInnerHtml(chord){
  const q = qualityById(chord.quality);
  const root = rootHtml(chord.root);
  if(!q.suffix) return root;
  const cls = q.sup ? 'suf' : '';
  return `${root}<span class="${cls}">${q.suffix}</span>`;
}

function renderBarEl(item){
  const div = document.createElement('div');
  div.className='bar';
  div.dataset.id=item.id;

  if(item.kind==='repeat'){
    div.innerHTML = '<span class="bar-glyph">%</span>';
    div.onclick=()=>handleBarTap(item, 0);
    return div;
  }
  if(item.kind==='rest'){
    div.innerHTML = `<span class="bar-glyph" style="font-size:0;">${wholeRestSvg()}</span>`;
    div.onclick=()=>handleBarTap(item, 0);
    return div;
  }

  if(item.chords.length===0){
    div.innerHTML = '<span class="empty-hint">tap</span>';
    div.onclick=()=>handleBarTap(item, 0);
    return div;
  }

  const denseCls = item.chords.length>=4 ? ' dense' : '';
  for(let beatIdx=0; beatIdx<4; beatIdx++){
    const slot = document.createElement('div');
    slot.className='slot';
    const chord = item.chords.find(c=>c.beat===beatIdx);
    if(chord && chord.rest){
      slot.innerHTML = halfRestSvg(14);
      slot.addEventListener('pointerdown', (e)=>slotPointerDown(e, item, beatIdx, div));
    } else if(chord){
      const c = document.createElement('span');
      c.className='chord'+denseCls;
      c.innerHTML = chordInnerHtml(chord);
      slot.appendChild(c);
      slot.addEventListener('pointerdown', (e)=>slotPointerDown(e, item, beatIdx, div));
    }
    slot.onclick=(e)=>{
      e.stopPropagation();
      if(suppressNextClick){ suppressNextClick=false; return; }
      handleBarTap(item, beatIdx);
    };
    div.appendChild(slot);
  }
  return div;
}

function renderBorderEl(border, idx){
  const div = document.createElement('div');
  div.className='border-line';
  div.onclick=()=>openBorderEdit(idx);
  const type = border.type;
  if(type==='repeatStart'){
    div.innerHTML = `<div class="ln-thick"></div><div class="ln-thin"></div><div class="dots"><span></span><span></span></div>`;
  } else if(type==='repeatEnd'){
    div.innerHTML = `<div class="dots"><span></span><span></span></div><div class="ln-thin"></div><div class="ln-thick"></div>`;
  } else if(type==='end'){
    div.innerHTML = `<div class="ln-thin"></div><div class="ln-thin"></div>`;
  } else {
    div.innerHTML = `<div class="ln-thin"></div>`;
  }
  return div;
}

function renderLabelSlot(idx, allow){
  const div = document.createElement('div');
  div.className='label-slot';
  const b = song.borders[idx];
  if(allow && b && b.label){
    div.innerHTML = `<span class="sec-badge">${b.label}</span>`;
  }
  return div;
}

function renderTimeSigEl(showDigits){
  const div = document.createElement('div');
  div.className='time-sig';
  if(showDigits){
    div.innerHTML = `<div class="num">${song.timeSig.num}</div><div class="den">${song.timeSig.den}</div>`;
    div.onclick=(e)=>{ e.stopPropagation(); openTimeSigEdit(); };
  }
  return div;
}

function makeAddBarBtn(){
  const addBtn = document.createElement('div');
  addBtn.className='add-bar';
  addBtn.textContent='+';
  addBtn.onclick=()=>{
    pushSongUndo();
    const lastIdx = song.items.length;
    const wasEnd = song.borders[lastIdx].type === 'end';
    if(wasEnd) song.borders[lastIdx].type = 'normal';
    song.items.push(bar([]));
    song.borders.push({type: wasEnd ? 'end' : 'normal', label:null});
    render();
  };
  return addBtn;
}

function render(){
  const inner = document.getElementById('chartInner');
  inner.querySelectorAll('.song-block').forEach(e=>e.remove());
  const canvas = document.getElementById('inkCanvas');

  const rows = chunkRows(song.items, BARS_PER_ROW);
  const songBlock = document.createElement('div');
  songBlock.className='song-block';

  let lastRowBarRow = null;
  let globalIdx = 0;

  rows.forEach((row, rIdx)=>{
    const lane = document.createElement('div');
    lane.className='write-lane';
    if(rIdx===0 && song.feel){
      lane.innerHTML = `<span class="feel-label">${song.feel}</span>`;
    }
    songBlock.appendChild(lane);

    const rowStart = globalIdx;
    const isLastRow = (rIdx === rows.length-1);
    let needsLabelRow = false;
    for(let k=rowStart;k<rowStart+row.length;k++){
      if(song.borders[k] && song.borders[k].label){ needsLabelRow=true; break; }
    }
    if(!needsLabelRow && isLastRow && song.borders[rowStart+row.length] && song.borders[rowStart+row.length].label){
      needsLabelRow = true;
    }
    if(needsLabelRow){
      const labelRow = document.createElement('div');
      labelRow.className='label-row';
      const tsSpacer=document.createElement('div');
      tsSpacer.className='ts-spacer';
      labelRow.appendChild(tsSpacer);
      let li = rowStart;
      row.forEach(()=>{
        labelRow.appendChild(renderLabelSlot(li, true));
        li++;
        const barSpacer=document.createElement('div');
        barSpacer.className='bar-spacer';
        labelRow.appendChild(barSpacer);
      });
      labelRow.appendChild(renderLabelSlot(li, isLastRow));
      songBlock.appendChild(labelRow);
    }

    const barRow = document.createElement('div');
    barRow.className='bar-row';
    barRow.appendChild(renderTimeSigEl(rIdx===0));

    row.forEach(item=>{
      barRow.appendChild(renderBorderEl(song.borders[globalIdx] || {type:'normal',label:null}, globalIdx));
      barRow.appendChild(renderBarEl(item));
      globalIdx++;
    });
    barRow.appendChild(renderBorderEl(song.borders[globalIdx] || {type:'normal',label:null}, globalIdx));

    songBlock.appendChild(barRow);
    lastRowBarRow = barRow;
  });

  const lastRow = rows[rows.length-1];
  if(lastRow.length < BARS_PER_ROW){
    lastRowBarRow.appendChild(makeAddBarBtn());
  } else {
    const extraRow = document.createElement('div');
    extraRow.className='bar-row';
    extraRow.appendChild(makeAddBarBtn());
    songBlock.appendChild(extraRow);
  }

  inner.appendChild(songBlock);
  inner.appendChild(canvas);
  requestAnimationFrame(resizeCanvasPreserving);
  renderInfoPanel();
}

/* ============ Bar content (chord / % / rest / half-rest) ============ */
function setBarKind(barId, kind){
  pushSongUndo();
  const b = findBarById(barId);
  if(!b) return closeSheet();
  b.kind=kind; b.chords=[];
  closeSheet();
  render();
}
function setHalfRest(barId){
  pushSongUndo();
  const b = findBarById(barId);
  if(!b) return closeSheet();
  b.kind='chords';
  if(pickerTarget.mode==='edit'){
    const c = b.chords.find(c=>c.beat===pickerTarget.beat);
    if(c){ c.rest=true; delete c.root; delete c.quality; }
  } else {
    addChordWithReflow(b, {rest:true});
  }
  closeSheet();
  render();
}
function duplicateBar(barId){
  pushSongUndo();
  const idx = song.items.findIndex(it=>it.id===barId);
  if(idx<0) return;
  const original = song.items[idx];
  const copy = bar(original.chords.map(c=>({...c})));
  copy.kind = original.kind;
  song.items.splice(idx+1, 0, copy);
  song.borders.splice(idx+1, 0, {type:'normal', label:null});
  closeSheet();
  render();
}
function deleteBar(barId){
  pushSongUndo();
  const idx = song.items.findIndex(it=>it.id===barId);
  if(idx<0) return;
  if(song.items.length===1){
    song.items[0] = bar([]);
    closeSheet();
    render();
    return;
  }
  const removed = song.borders[idx+1];
  const kept = song.borders[idx];
  if(kept.type==='normal' && removed.type!=='normal') kept.type = removed.type;
  if(!kept.label && removed.label) kept.label = removed.label;
  song.items.splice(idx,1);
  song.borders.splice(idx+1,1);
  closeSheet();
  render();
}

/* ============ Chord picker ============ */
let pickerTarget = null;
let pickerRoot = null;
let pickerWholeBarOptions = false;

function handleBarTap(item, beatIdx){
  if(mode!=='chords') return;
  if(item.kind!=='chords' || item.chords.length===0){
    pickerTarget = {barId:item.id, mode:'add'};
    pickerRoot = null;
    pickerWholeBarOptions = true;
    openStep1();
    return;
  }
  pickerWholeBarOptions = false;
  const existing = item.chords.find(c=>c.beat===beatIdx);
  if(existing){
    pickerTarget = {barId:item.id, mode:'edit', beat:beatIdx};
    if(existing.rest){ pickerRoot=null; openStep1(); }
    else { pickerRoot = existing.root; openStep2(); }
  } else {
    pickerTarget = {barId:item.id, mode:'add'};
    pickerRoot = null;
    openStep1();
  }
}

function openStep1(){
  const wholeBarBlock = pickerWholeBarOptions ? `
    <div class="sheet-subhead">Or</div>
    <div class="wholebar-grid">
      <button class="icon-btn" onclick="setBarKind('${pickerTarget.barId}','repeat')">%</button>
      <button class="icon-btn" onclick="setBarKind('${pickerTarget.barId}','rest')">${wholeRestSvg(26)}</button>
    </div>
  ` : '';
  showSheet(`
    <div class="sheet-header"><span>Choose root</span><button onclick="closeSheet()">✕</button></div>
    <div class="root-grid">
      ${ROOTS.map(r=>`<button onclick="pickRoot('${r}')">${rootHtml(r)}</button>`).join('')}
      <button class="icon-btn" onclick="setHalfRest('${pickerTarget.barId}')">${halfRestSvg(20)}</button>
    </div>
    ${wholeBarBlock}
    <div class="sheet-actions">
      <button class="neutral" onclick="clearChordSlot()">Clear</button>
      <button class="neutral" onclick="duplicateBar('${pickerTarget.barId}')">Duplicate Bar</button>
      <button class="danger" onclick="deleteBar('${pickerTarget.barId}')">Delete Bar</button>
    </div>
  `);
}
function pickRoot(r){ pickerRoot=r; openStep2(); }

function openStep2(){
  showSheet(`
    <div class="sheet-header">
      <button onclick="openStep1()">‹</button>
      <span>${rootHtml(pickerRoot)} — quality</span>
      <button onclick="closeSheet()">✕</button>
    </div>
    <div class="quality-grid">
      ${QUALITIES.map(q=>`<button onclick="pickQuality('${q.id}')">${q.label}</button>`).join('')}
    </div>
    <div class="sheet-actions">
      <button class="neutral" onclick="clearChordSlot()">Clear</button>
      <button class="neutral" onclick="duplicateBar('${pickerTarget.barId}')">Duplicate Bar</button>
      <button class="danger" onclick="deleteBar('${pickerTarget.barId}')">Delete Bar</button>
    </div>
  `);
}
function pickQuality(qid){
  pushSongUndo();
  const b = findBarById(pickerTarget.barId);
  if(!b) return closeSheet();
  b.kind = 'chords';
  if(pickerTarget.mode==='edit'){
    const c = b.chords.find(c=>c.beat===pickerTarget.beat);
    if(c){ c.root=pickerRoot; c.quality=qid; delete c.rest; }
  } else {
    addChordWithReflow(b, {root:pickerRoot, quality:qid});
  }
  closeSheet();
  render();
}
function clearChordSlot(){
  if(pickerTarget.mode!=='edit'){ closeSheet(); return; }
  pushSongUndo();
  const b = findBarById(pickerTarget.barId);
  if(b){
    const idx = b.chords.findIndex(c=>c.beat===pickerTarget.beat);
    if(idx>=0){
      b.chords.splice(idx,1);
      reflowBeats(b);
    }
  }
  closeSheet();
  render();
}

/* ============ Chord drag & drop (reposition within a bar) ============ */
let chordDrag = null;
let suppressNextClick = false;

function beatFromClientX(clientX, rect){
  let rel = (clientX - rect.left) / rect.width;
  rel = Math.max(0, Math.min(0.999, rel));
  return Math.floor(rel*4);
}
function clearBeatHighlight(){
  document.querySelectorAll('.slot.drop-target').forEach(el=>el.classList.remove('drop-target'));
  document.querySelectorAll('.slot.drag-source').forEach(el=>el.classList.remove('drag-source'));
}
function highlightBeatTarget(targetBeat){
  clearBeatHighlight();
  const slots = chordDrag.barEl.querySelectorAll('.slot');
  if(slots[targetBeat]) slots[targetBeat].classList.add('drop-target');
  if(slots[chordDrag.fromBeat]) slots[chordDrag.fromBeat].classList.add('drag-source');
}

function slotPointerDown(e, item, beatIdx, barEl){
  if(mode!=='chords') return;
  const rect = barEl.getBoundingClientRect();
  chordDrag = {
    barId:item.id,
    fromBeat:beatIdx,
    targetBeat:beatIdx,
    startX:e.clientX,
    startY:e.clientY,
    dragging:false,
    rect,
    barEl
  };
  window.addEventListener('pointermove', onChordDragMove);
  window.addEventListener('pointerup', onChordDragEnd);
}

function onChordDragMove(e){
  if(!chordDrag) return;
  const dx = e.clientX - chordDrag.startX;
  const dy = e.clientY - chordDrag.startY;

  if(!chordDrag.dragging){
    if(Math.abs(dy) > 8 && Math.abs(dy) > Math.abs(dx)){
      // predominantly vertical — this is a page scroll, not a chord drag. Bail out.
      window.removeEventListener('pointermove', onChordDragMove);
      window.removeEventListener('pointerup', onChordDragEnd);
      chordDrag = null;
      return;
    }
    if(Math.abs(dx) < 6) return;
    chordDrag.dragging = true;
    pushSongUndo();
    document.getElementById('chartScroll').classList.add('dragging-chord');
    highlightBeatTarget(chordDrag.targetBeat);
  }

  e.preventDefault();
  const beat = beatFromClientX(e.clientX, chordDrag.rect);
  if(beat !== chordDrag.targetBeat){
    chordDrag.targetBeat = beat;
    highlightBeatTarget(beat);
  }
}

function onChordDragEnd(){
  window.removeEventListener('pointermove', onChordDragMove);
  window.removeEventListener('pointerup', onChordDragEnd);
  document.getElementById('chartScroll').classList.remove('dragging-chord');
  clearBeatHighlight();
  if(!chordDrag){ return; }

  if(chordDrag.dragging){
    const b = findBarById(chordDrag.barId);
    const from = chordDrag.fromBeat;
    const to = chordDrag.targetBeat;
    if(b && from !== to){
      const moving = b.chords.find(c=>c.beat===from);
      const occupying = b.chords.find(c=>c.beat===to);
      if(moving){
        moving.beat = to;
        if(occupying){ occupying.beat = from; }
      }
    }
    render();
    suppressNextClick = true;
    setTimeout(()=>{ suppressNextClick=false; }, 60);
  }
  chordDrag = null;
}

/* ============ Ink canvas ============ */
let drawing=false;
let currentStroke=[];
const PEN_COLOR = '#8a3b2c';

function resizeCanvasPreserving(){
  const canvas = document.getElementById('inkCanvas');
  const inner = document.getElementById('chartInner');
  const newW = inner.scrollWidth;
  const newH = inner.scrollHeight;
  const prevW = parseFloat(canvas.dataset.cssW||0);
  const prevH = parseFloat(canvas.dataset.cssH||0);
  if(newW===prevW && newH===prevH) return;

  const dpr = window.devicePixelRatio || 1;
  let snapshot = null;
  if(canvas.width>0 && canvas.height>0){
    snapshot = document.createElement('canvas');
    snapshot.width = canvas.width;
    snapshot.height = canvas.height;
    snapshot.getContext('2d').drawImage(canvas,0,0);
  }

  canvas.style.width = newW+'px';
  canvas.style.height = newH+'px';
  canvas.width = Math.round(newW*dpr);
  canvas.height = Math.round(newH*dpr);

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);

  if(snapshot){
    ctx.drawImage(snapshot, 0,0, snapshot.width, snapshot.height, 0,0, prevW||newW, prevH||newH);
  }

  canvas.dataset.cssW = newW;
  canvas.dataset.cssH = newH;
}

function getCanvasPoint(e){
  const canvas = document.getElementById('inkCanvas');
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return {x:cx, y:cy};
}

function startDraw(e){
  if(mode==='chords') return;
  pushInkUndo();
  drawing=true;
  currentStroke=[getCanvasPoint(e)];
  e.preventDefault();
}
function moveDraw(e){
  if(!drawing) return;
  const pt = getCanvasPoint(e);
  currentStroke.push(pt);
  const canvas = document.getElementById('inkCanvas');
  const ctx = canvas.getContext('2d');
  ctx.lineJoin='round'; ctx.lineCap='round';
  if(mode==='erase'){
    ctx.globalCompositeOperation='destination-out';
    ctx.shadowBlur=0;
    ctx.lineWidth=20;
  } else {
    ctx.globalCompositeOperation='source-over';
    ctx.lineWidth=2.6;
    ctx.strokeStyle=PEN_COLOR;
    ctx.shadowColor=PEN_COLOR;
    ctx.shadowBlur=0.6;
  }

  const n = currentStroke.length;
  if(n < 3){
    const p0 = currentStroke[0];
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(pt.x, pt.y);
    ctx.stroke();
  } else {
    const p0 = currentStroke[n-3];
    const p1 = currentStroke[n-2];
    const p2 = currentStroke[n-1];
    const mid1 = {x:(p0.x+p1.x)/2, y:(p0.y+p1.y)/2};
    const mid2 = {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2};
    ctx.beginPath();
    ctx.moveTo(mid1.x, mid1.y);
    ctx.quadraticCurveTo(p1.x, p1.y, mid2.x, mid2.y);
    ctx.stroke();
  }
  e.preventDefault();
}
function endDraw(){ drawing=false; currentStroke=[]; }

function clearInkRaw(){
  const canvas = document.getElementById('inkCanvas');
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width, canvas.height);
  ctx.restore();
  const dpr = window.devicePixelRatio||1;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function clearInk(){
  pushInkUndo();
  clearInkRaw();
}

function continueAsGuest(){ showEditor(); }
function attemptSignIn(){
  const msg = document.getElementById('welcomeMsg');
  msg.textContent = 'Accounts are coming soon — continue as guest for now.';
}

/* ============ Init ============ */
window.addEventListener('resize', ()=>requestAnimationFrame(()=>{
  applyResponsiveLayout();
  resizeCanvasPreserving();
}));
window.addEventListener('beforeprint', applyResponsiveLayout);
window.addEventListener('afterprint', ()=>requestAnimationFrame(applyResponsiveLayout));

document.addEventListener('DOMContentLoaded', ()=>{
  const canvas = document.getElementById('inkCanvas');
  canvas.addEventListener('pointerdown', startDraw);
  canvas.addEventListener('pointermove', moveDraw);
  window.addEventListener('pointerup', endDraw);
  canvas.addEventListener('touchstart', startDraw, {passive:false});
  canvas.addEventListener('touchmove', moveDraw, {passive:false});
  window.addEventListener('touchend', endDraw);

  document.getElementById('welcomeGlyph').innerHTML = svgIcon('staffPen', 38);
  document.getElementById('backIcon').innerHTML = svgIcon('chevron', 15) + '<span>Back</span>';
  document.getElementById('topDrawIcon').innerHTML = svgIcon('pencil');
  document.getElementById('topClearIcon').innerHTML = svgIcon('droplet');
  document.getElementById('topUndoIcon').innerHTML = svgIcon('undo');
  renderToolbars();

  syncTitleDisplay();
  updateHeader();
  render();
  applyResponsiveLayout();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
