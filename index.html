<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lead Sheet Editor</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lead Sheets">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Petaluma Script';
    src: url('https://raw.githubusercontent.com/steinbergmedia/petaluma/master/redist/otf/PetalumaScript.otf') format('opentype');
    font-display: swap;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --header-bg:#1c1c1e;
    --header-fg:#f2f2f4;
    --header-sub:#9a9a9e;
    --accent:#4da3ff;
    --paper:#efece4;
    --card:#ffffff;
    --card-border:#d8d4c8;
    --ink:#1c1c1c;
    --ink-soft:#6b6a66;
    --pen:#25409e;
    --danger:#c0453f;
    --chord-font: 'Petaluma Script', 'Lora', cursive;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--chord-font);
    background:#d9d5c8;
    display:flex;
    justify-content:center;
    overflow:hidden;
  }
  #app{
    width:100%;
    max-width:430px;
    height:100vh;
    height:100dvh;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:0 0 24px rgba(0,0,0,.25);
  }

  /* ===== Header ===== */
  .topbar{
    background:var(--header-bg);
    color:var(--header-fg);
    flex:0 0 auto;
    padding:8px 12px 10px;
    font-family:Helvetica,Arial,sans-serif;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .topbar .back{color:var(--accent);font-size:15px;flex:0 0 auto;cursor:pointer;}
  .topbar .titlewrap{flex:1 1 auto;text-align:center;min-width:0;cursor:pointer;}
  .topbar .title{font-size:15px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .sub{font-size:10.5px;color:var(--header-sub);margin-top:1px;}
  .topbar .icon{color:var(--accent);font-size:16px;flex:0 0 auto;padding:2px 4px;cursor:pointer;}

  /* ===== Chart scroll area ===== */
  .chart-scroll{
    flex:1 1 auto;
    overflow-y:auto;
    overflow-x:auto;
    padding:8px 2px 90px 0;
    -webkit-overflow-scrolling:touch;
  }
  .chart-card{
    background:var(--card);
    border:none;
    border-radius:6px;
    padding:10px 1px 12px 0;
    position:relative;
  }
  .sheet-title{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:var(--ink);
    margin-bottom:2px;
    cursor:pointer;
    letter-spacing:.2px;
  }
  .sheet-composer{
    text-align:center;
    font-size:12px;
    font-style:italic;
    color:var(--ink-soft);
    margin-bottom:10px;
    cursor:pointer;
  }
  #chartInner{ position:relative; }
  #inkCanvas{
    position:absolute;
    top:0; left:0;
    pointer-events:none;
    touch-action:none;
  }
  .chart-scroll.draw-mode #inkCanvas,
  .chart-scroll.erase-mode #inkCanvas{
    pointer-events:auto;
  }

  .write-lane{ height:26px; }

  .label-row{
    display:flex;
    align-items:flex-end;
    min-height:15px;
  }
  .label-row .ts-spacer{ flex:0 0 11px; }
  .label-row .bar-spacer{ flex:0 0 90px; }
  .label-slot{
    flex:0 0 auto;
    min-width:13px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .sec-badge{
    background:var(--ink);
    color:#fff;
    font-family:Helvetica,Arial,sans-serif;
    font-weight:bold;
    font-size:10px;
    padding:1px 5px;
    border-radius:2px;
    margin-bottom:2px;
    white-space:nowrap;
  }

  .bar-row{
    display:flex;
    align-items:stretch;
    margin-bottom:5px;
  }

  .time-sig{
    flex:0 0 11px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    justify-content:center;
    line-height:.85;
    cursor:pointer;
    margin-right:0;
    padding-right:0.5px;
    overflow:visible;
  }
  .time-sig .num,.time-sig .den{
    font-size:19px;
    font-weight:bold;
    color:var(--ink);
    font-family:var(--chord-font);
    display:inline-block;
    transform:scaleX(0.5);
    transform-origin:right center;
  }

  .bar{
    flex:0 0 90px;
    min-height:56px;
    margin:2px 0;
    padding:5px 4px 3px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    align-items:stretch;
    cursor:pointer;
    position:relative;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  .bar .slot{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    min-width:0;
    min-height:46px;
    touch-action:pan-y;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  .bar .slot.drop-target{
    background:#eaf1ff;
    border-radius:4px;
    outline:2px dashed #4da3ff;
    outline-offset:-2px;
  }
  .bar .slot.drag-source{
    opacity:.35;
  }
  .chart-scroll.dragging-chord,
  .chart-scroll.dragging-chord *{
    user-select:none;
    -webkit-user-select:none;
  }
  .bar .chord{
    font-size:21px;
    color:var(--ink);
    line-height:1;
    white-space:nowrap;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
  }
  .bar .chord.dense{
    font-size:18px;
    display:inline-block;
    transform:scaleX(0.7);
    transform-origin:left center;
  }
  .bar .chord .suf{
    font-size:.62em;
    vertical-align:top;
    position:relative;
    top:1px;
    margin-left:1px;
  }
  .bar .chord .acc{
    font-size:.72em;
    margin-left:-1px;
    position:relative;
    top:-1px;
  }
  .bar .chord.dense .acc{
    margin-left:1px;
  }
  .bar .empty-hint{
    grid-column:1/-1;
    font-family:Helvetica,Arial,sans-serif;
    font-size:10px;
    color:#c7c3b7;
    margin:0 auto;
  }
  .bar .bar-glyph{
    grid-column:1/-1;
    font-size:22px;
    font-weight:bold;
    color:var(--ink);
    margin:0 auto;
  }
  .bar .add-chord{
    position:absolute;
    right:2px; bottom:1px;
    width:13px;height:13px;
    border-radius:50%;
    background:#eef1f6;
    border:1px solid #c7d3e6;
    color:#3a6fc4;
    font-family:Helvetica,Arial,sans-serif;
    font-size:9px;
    display:flex;align-items:center;justify-content:center;
    line-height:1;
    pointer-events:none;
  }

  .add-bar{
    flex:0 0 48px;
    min-height:56px;
    margin:2px 2px;
    border:1.5px dashed #c7c3b7;
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    color:#a8a49a;
    font-family:Helvetica,Arial,sans-serif;
    font-size:20px;
    cursor:pointer;
  }

  /* ===== Border lines (tappable barlines) ===== */
  .border-line{
    flex:0 0 auto;
    min-width:13px;
    display:flex;
    align-items:stretch;
    justify-content:center;
    gap:2px;
    cursor:pointer;
    margin:2px 0;
  }
  .border-line .ln-thin{ width:1.6px; background:var(--ink); align-self:stretch; }
  .border-line .ln-thick{ width:3.5px; background:var(--ink); align-self:stretch; }
  .border-line .dots{ display:flex; flex-direction:column; justify-content:center; gap:2px; }
  .border-line .dots span{ width:3.5px;height:3.5px;border-radius:50%;background:var(--ink);display:block; }

  /* ===== Toolbar ===== */
  .toolbar{
    flex:0 0 auto;
    background:var(--header-bg);
    display:flex;
    gap:6px;
    padding:8px 10px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .tbtn{
    flex:0 0 auto;
    font-family:Helvetica,Arial,sans-serif;
    font-size:12.5px;
    color:#d7d7db;
    background:#2c2c2e;
    border:1px solid #3a3a3c;
    padding:9px 13px;
    border-radius:20px;
    white-space:nowrap;
    cursor:pointer;
  }
  .tbtn.active{ background:var(--accent); color:#0a0a0a; border-color:var(--accent); font-weight:bold; }
  .tbtn.action{ background:#232326; color:#a9c8ff; }
  .tbtn.warn{ background:#2c2020; color:#ff9d97; }

  /* ===== Toast ===== */
  #toast{
    position:absolute;
    top:60px; left:50%;
    transform:translateX(-50%);
    background:rgba(28,28,30,.92);
    color:#fff;
    font-family:Helvetica,Arial,sans-serif;
    font-size:12.5px;
    padding:9px 14px;
    border-radius:20px;
    display:none;
    z-index:40;
    max-width:85%;
    text-align:center;
  }
  #toast.show{display:block;}

  /* ===== Bottom sheet ===== */
  #backdrop{
    position:absolute; inset:0;
    background:rgba(0,0,0,.35);
    opacity:0; pointer-events:none;
    transition:opacity .18s ease;
    z-index:50;
  }
  #backdrop.open{opacity:1;pointer-events:auto;}
  #sheet{
    position:absolute;
    left:0; right:0; bottom:0;
    background:#fff;
    border-radius:16px 16px 0 0;
    padding:14px 16px 22px;
    transform:translateY(100%);
    transition:transform .22s ease;
    z-index:51;
    font-family:Helvetica,Arial,sans-serif;
    max-height:75%;
    overflow-y:auto;
  }
  #sheet.open{transform:translateY(0);}
  .sheet-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:12px;
  }
  .sheet-header span{font-size:15px;font-weight:bold;color:#1c1c1c;}
  .sheet-header button{
    background:none;border:none;font-size:16px;color:#8a867d;cursor:pointer;padding:4px 6px;
  }
  .sheet-subhead{
    font-size:11.5px;color:#8a867d;font-weight:bold;text-transform:uppercase;
    letter-spacing:.3px;margin:16px 0 8px;
  }
  .sheet-body-text{
    font-size:13px;color:#6b6a66;margin-bottom:14px;line-height:1.4;
  }
  .root-grid,.quality-grid,.symbol-grid,.timesig-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .root-grid button,.quality-grid button,.symbol-grid button,.timesig-grid button{
    padding:12px 4px;
    border-radius:8px;
    border:1px solid #ddd8ca;
    background:#faf9f5;
    font-family:var(--chord-font);
    font-size:16px;
    color:#1c1c1c;
    cursor:pointer;
  }
  .quality-grid button{font-family:Helvetica,Arial,sans-serif;font-size:12.5px;}
  .symbol-grid{grid-template-columns:repeat(1,1fr);}
  .symbol-grid button{font-family:Helvetica,Arial,sans-serif;font-size:14px;padding:14px 6px;text-align:left;}
  .wholebar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .icon-btn{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;}
  .timesig-grid button{font-family:Helvetica,Arial,sans-serif;font-size:14px;font-weight:bold;}
  .sheet-actions{margin-top:14px;display:flex;gap:8px;}
  .sheet-actions button{
    flex:1;
    padding:11px;
    border-radius:8px;
    border:none;
    font-family:Helvetica,Arial,sans-serif;
    font-size:13px;
    cursor:pointer;
  }
  .title-edit input{
    width:100%;padding:10px;font-size:15px;border:1px solid #ddd8ca;border-radius:8px;font-family:Helvetica,Arial,sans-serif;
  }

  @media print{
    html, body{ height:auto !important; overflow:visible !important; background:#fff; }
    #app{ box-shadow:none; max-width:none; height:auto !important; overflow:visible !important; }
    .topbar, .toolbar, #toast, #backdrop, #sheet{ display:none !important; }
    .chart-scroll{ overflow:visible !important; padding:0; height:auto !important; }
    .chart-card{ border:none; }
    .add-bar, .empty-hint{ display:none !important; }
  }
  body.exporting .add-bar,
  body.exporting .empty-hint{
    display:none !important;
  }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="back">‹ Back</div>
    <div class="titlewrap" onclick="openTitleEdit()">
      <div class="title" id="titleText">Autumn Leaves</div>
      <div class="sub" id="subText">4/4 · G minor</div>
    </div>
    <div class="icon" onclick="toggleMode('draw')">✎</div>
    <div class="icon" onclick="openExportSheet()">⤴</div>
  </div>

  <div class="chart-scroll" id="chartScroll">
    <div class="chart-card">
      <div class="sheet-title" id="sheetTitleText" onclick="openTitleEdit()">Autumn Leaves</div>
      <div class="sheet-composer" id="sheetComposerText" onclick="openTitleEdit()" style="display:none;"></div>
      <div id="chartInner">
        <canvas id="inkCanvas"></canvas>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <div class="toolbar">
    <button class="tbtn active" id="modeChords" onclick="toggleMode('chords')">Edit</button>
    <button class="tbtn" id="modeDraw" onclick="toggleMode('draw')">Draw</button>
    <button class="tbtn" id="modeErase" onclick="toggleMode('erase')">Erase</button>
    <button class="tbtn action" onclick="undo()">Undo</button>
    <button class="tbtn action" onclick="clearInk()">Clear Ink</button>
    <button class="tbtn action" onclick="openFontPicker()">Font</button>
    <button class="tbtn warn" onclick="confirmClearPage()">Clear Page</button>
  </div>

  <input type="file" id="importFileInput" accept="application/json,.json" style="display:none;" onchange="handleImportFile(event)">
  <div id="backdrop" onclick="closeSheet()"></div>
  <div id="sheet"></div>
</div>

<script>
/* ============ Data ============ */
const ROOTS = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const QUALITIES = [
  {id:'maj',  label:'Major',  suffix:'',     sup:false},
  {id:'m',    label:'Minor',  suffix:'−',    sup:false},
  {id:'7',    label:'7',      suffix:'7',    sup:true},
  {id:'maj7', label:'Maj7',   suffix:'Δ7',   sup:true},
  {id:'m7',   label:'Min7',   suffix:'−7',   sup:true},
  {id:'dim',  label:'Dim',    suffix:'°',    sup:true},
  {id:'sus4', label:'Sus4',   suffix:'sus4', sup:true},
  {id:'add9', label:'Add9',   suffix:'add9', sup:true},
  {id:'m7b5', label:'Min7♭5',suffix:'ø7',   sup:true},
  {id:'aug',  label:'Aug',    suffix:'+',    sup:true},
];
const TIME_SIGS = [[4,4],[3,4],[2,4],[6,8],[9,8],[12,8],[5,4],[7,8]];
const SECTION_LETTERS = ['A','B','C','D','E','F','G','H'];
const NAMED_SECTIONS = ['Verse','Pre-Chorus','Chorus','Interlude','Solo'];
const MAX_CHORDS_PER_BAR = 4;
const FONT_OPTIONS = [
  {id:'lora', label:'Classic', sample:'Db7', family:"'Lora', Georgia, 'Times New Roman', serif"},
  {id:'petaluma', label:'Copyist', sample:'Db7', family:"'Petaluma Script', 'Lora', cursive"},
  {id:'caveat', label:'Handwritten', sample:'Db7', family:"'Caveat', 'Lora', cursive"},
];
const BARS_PER_ROW = 4;

let idCounter = 1;
const genId = () => 'id' + (idCounter++);

function bar(chords){ return {type:'bar', id:genId(), kind:'chords', chords: chords||[]}; }

// Default beat layout (0-indexed, 4 beats per bar) for a given chord count.
// 1 chord: |X   |   2 chords: |X X |   3 chords: |XXX |   4 chords: |XXXX|
function defaultBeats(n){
  if(n<=0) return [];
  if(n===1) return [0];
  if(n===2) return [0,2];
  if(n===3) return [0,1,2];
  return [0,1,2,3];
}
function reflowBeats(b){
  const positions = defaultBeats(b.chords.length);
  const sorted = b.chords.slice().sort((x,y)=>x.beat-y.beat);
  sorted.forEach((c,i)=>{ c.beat = positions[i]; });
}
function addChordWithReflow(b, newChordPartial){
  const positions = defaultBeats(b.chords.length + 1);
  const sorted = b.chords.slice().sort((x,y)=>x.beat-y.beat);
  sorted.forEach((c,i)=>{ c.beat = positions[i]; });
  newChordPartial.beat = positions[positions.length-1];
  b.chords.push(newChordPartial);
}

function blankSong(){
  return {
    title:'My Song',
    composer:'',
    key:'',
    timeSig:{num:4, den:4},
    items:[ bar([]) ],
    borders:[ {type:'normal', label:null}, {type:'end', label:null} ]
  };
}

function defaultDemoSong(){
  const c1 = (r,q)=>({root:r, quality:q});
  const items = [
    bar([c1('C','m7')]),                              // 1
    bar([c1('F','7')]),                                // 2
    bar([c1('Bb','maj7')]),                            // 3
    bar([c1('Eb','maj7')]),                             // 4
    bar([c1('A','m7b5')]),                             // 5
    bar([c1('D','7')]),                                // 6
    bar([c1('G','m')]),                                // 7
    (()=>{ const b=bar([]); b.kind='repeat'; return b; })(), // 8 (%)
    bar([c1('A','m7b5')]),                             // 9
    bar([c1('D','7')]),                                // 10
    bar([c1('G','m')]),                                // 11
    (()=>{ const b=bar([]); b.kind='repeat'; return b; })(), // 12 (%)
    bar([c1('C','m7')]),                               // 13
    bar([c1('F','7')]),                                // 14
    bar([c1('Bb','maj7')]),                            // 15
    bar([c1('Eb','maj7')]),                            // 16
    bar([c1('A','m7b5')]),                             // 17
    bar([c1('D','7')]),                                // 18
    bar([{root:'G',quality:'m7',beat:0},{root:'Gb',quality:'m7',beat:2}]), // 19
    bar([{root:'F',quality:'m7',beat:0},{root:'E',quality:'7',beat:2}]),   // 20
    bar([c1('A','m7b5')]),                             // 21
    bar([c1('D','7')]),                                // 22
    bar([c1('G','m')]),                                // 23
    (()=>{ const b=bar([]); b.kind='repeat'; return b; })(), // 24 (%)
  ];
  // give single-chord bars an explicit beat 0 (addChordWithReflow isn't used here; set directly)
  items.forEach(it=>{
    if(it.kind==='chords' && it.chords.length===1 && it.chords[0].beat===undefined){
      it.chords[0].beat = 0;
    }
  });
  const borders = items.map(()=>({type:'normal', label:null}));
  borders.push({type:'normal', label:null}); // trailing, will be set to 'end' below
  borders[0].label = 'A';
  borders[8].label = 'B';
  borders[16].label = 'C';
  borders[borders.length-1].type = 'end';
  return {
    title:'Autumn Leaves',
    composer:'Joseph Kosma',
    key:'G minor',
    timeSig:{num:4, den:4},
    items,
    borders
  };
}

// song.items is a flat list of bars.
// song.borders[i] = {type, label} is the border BEFORE items[i];
// song.borders[items.length] is the trailing (final) border.
let song = defaultDemoSong();

/* ============ Undo stack ============ */
let undoStack = [];
function snapshotSongStr(){ return JSON.stringify(song); }
function pushSongUndo(){
  undoStack.push({type:'song', data:snapshotSongStr()});
  if(undoStack.length>60) undoStack.shift();
}
function pushInkUndo(){
  const canvas = document.getElementById('inkCanvas');
  if(canvas.width>0 && canvas.height>0){
    undoStack.push({type:'ink', data:canvas.toDataURL(), w:canvas.width, h:canvas.height});
    if(undoStack.length>60) undoStack.shift();
  }
}
function pushFullUndo(){
  const canvas = document.getElementById('inkCanvas');
  undoStack.push({
    type:'full',
    songData: snapshotSongStr(),
    inkData: canvas.width>0 ? canvas.toDataURL() : null,
    w:canvas.width, h:canvas.height
  });
  if(undoStack.length>60) undoStack.shift();
}
function restoreInkFromDataUrl(dataUrl, w, h){
  const canvas = document.getElementById('inkCanvas');
  const ctx = canvas.getContext('2d');
  if(!dataUrl){
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.restore();
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return;
  }
  const img = new Image();
  img.onload = ()=>{
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,w,h,0,0,canvas.width,canvas.height);
    ctx.restore();
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  };
  img.src = dataUrl;
}
function undo(){
  const entry = undoStack.pop();
  if(!entry){ showToast('Nothing to undo'); return; }
  if(entry.type==='song'){
    song = JSON.parse(entry.data);
    updateHeader();
    syncTitleDisplay();
    render();
  } else if(entry.type==='ink'){
    restoreInkFromDataUrl(entry.data, entry.w, entry.h);
  } else if(entry.type==='full'){
    song = JSON.parse(entry.songData);
    updateHeader();
    syncTitleDisplay();
    render();
    requestAnimationFrame(()=>restoreInkFromDataUrl(entry.inkData, entry.w, entry.h));
  }
}

/* ============ Helpers ============ */
function rootHtml(r){
  if(r.length===2 && r[1]==='b') return r[0]+'<span class="acc">♭</span>';
  return r;
}
function qualityById(id){ return QUALITIES.find(q=>q.id===id) || QUALITIES[0]; }
function wholeRestSvg(w){
  w = w||22;
  return `<svg width="${w}" height="16" viewBox="0 0 22 16" style="display:block;"><line x1="0" y1="4" x2="22" y2="4" stroke="#1c1c1c" stroke-width="1.6"/><rect x="3" y="4" width="13" height="6" fill="#1c1c1c"/></svg>`;
}
function halfRestSvg(w){
  w = w||22;
  return `<svg width="${w}" height="16" viewBox="0 0 22 16" style="display:block;"><line x1="0" y1="10" x2="22" y2="10" stroke="#1c1c1c" stroke-width="1.6"/><rect x="3" y="4" width="13" height="6" fill="#1c1c1c"/></svg>`;
}
function findBarById(id){ return song.items.find(it=>it.id===id) || null; }
function updateHeader(){

/* ============ Export / Import ============ */
function slugify(name){
  return (name||'lead-sheet').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'lead-sheet';
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function openExportSheet(){
  showSheet(`
    <div class="sheet-header"><span>Export</span><button onclick="closeSheet()">✕</button></div>
    <div class="symbol-grid">
      <button onclick="exportPNG()">Save as Image (PNG)</button>
      <button onclick="exportPDF()">Save as PDF</button>
      <button onclick="exportJSON()">Export Chart Data (.json)</button>
      <button onclick="triggerImportJSON()">Import Chart Data (.json)</button>
    </div>
    <div class="sheet-body-text" style="margin-top:14px;">PNG and PDF save exactly what's on the chart, including your handwriting. The .json file is this chart's raw data — export it to back it up or send it to someone else using this app, then use Import to load it back in.</div>
  `);
}
function exportPNG(){
  if(typeof html2canvas === 'undefined'){
    showToast('Image export needs an internet connection');
    return;
  }
  closeSheet();
  showToast('Preparing image…');
  document.body.classList.add('exporting');
  const card = document.querySelector('.chart-card');
  requestAnimationFrame(()=>{
    html2canvas(card, {backgroundColor:'#ffffff', scale:2}).then(canvas=>{
      canvas.toBlob(blob=>{
        downloadBlob(blob, slugify(song.title)+'.png');
      });
    }).catch(()=>{
      showToast('Image export failed');
    }).finally(()=>{
      document.body.classList.remove('exporting');
    });
  });
}
function exportPDF(){
  closeSheet();
  window.print();
}
function exportJSON(){
  const data = JSON.stringify(song, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  downloadBlob(blob, slugify(song.title)+'.json');
  closeSheet();
}
function triggerImportJSON(){
  document.getElementById('importFileInput').click();
}
function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.items) || !Array.isArray(parsed.borders)){
        showToast('That file does not look like a chart export');
        return;
      }
      pushSongUndo();
      song = parsed;
      if(!song.timeSig) song.timeSig = {num:4, den:4};
      if(typeof song.key !== 'string') song.key = '';
      if(typeof song.title !== 'string') song.title = 'My Song';
      if(typeof song.composer !== 'string') song.composer = '';
      syncTitleDisplay();
      updateHeader();
      closeSheet();
      render();
      showToast('Chart imported');
    } catch(err){
      showToast('Could not read that file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ============ Rendering ============ */
function chunkRows(items, barsPerRow){
  barsPerRow = barsPerRow || BARS_PER_ROW;
  const rows=[];
  for(let i=0;i<items.length;i+=barsPerRow){
    rows.push(items.slice(i, i+barsPerRow));
  }
  if(rows.length===0) rows.push([]);
  return rows;
}

function chordInnerHtml(chord){
  const q = qualityById(chord.quality);
  const root = rootHtml(chord.root);
  if(!q.suffix) return root;
  const cls = q.sup ? 'suf' : '';
  return `${root}<span class="${cls}">${q.suffix}</span>`;
}

function renderBarEl(item){
  const div = document.createElement('div');
  div.className='bar';
  div.dataset.id=item.id;

  if(item.kind==='repeat'){
    div.innerHTML = '<span class="bar-glyph">%</span>';
    div.onclick=()=>handleBarTap(item, 0);
    return div;
  }
  if(item.kind==='rest'){
    div.innerHTML = `<span class="bar-glyph" style="font-size:0;">${wholeRestSvg()}</span>`;
    div.onclick=()=>handleBarTap(item, 0);
    return div;
  }

  if(item.chords.length===0){
    div.innerHTML = '<span class="empty-hint">tap</span>';
    div.onclick=()=>handleBarTap(item, 0);
    return div;
  }

  const denseCls = item.chords.length>=4 ? ' dense' : '';
  for(let beatIdx=0; beatIdx<4; beatIdx++){
    const slot = document.createElement('div');
    slot.className='slot';
    const chord = item.chords.find(c=>c.beat===beatIdx);
    if(chord && chord.rest){
      slot.innerHTML = halfRestSvg(14);
      slot.addEventListener('pointerdown', (e)=>slotPointerDown(e, item, beatIdx, div));
    } else if(chord){
      const c = document.createElement('span');
      c.className='chord'+denseCls;
      c.innerHTML = chordInnerHtml(chord);
      slot.appendChild(c);
      slot.addEventListener('pointerdown', (e)=>slotPointerDown(e, item, beatIdx, div));
    }
    slot.onclick=(e)=>{
      e.stopPropagation();
      if(suppressNextClick){ suppressNextClick=false; return; }
      handleBarTap(item, beatIdx);
    };
    div.appendChild(slot);
  }
  return div;
}

function renderBorderEl(border, idx){
  const div = document.createElement('div');
  div.className='border-line';
  div.onclick=()=>openBorderEdit(idx);
  const type = border.type;
  if(type==='repeatStart'){
    div.innerHTML = `<div class="ln-thick"></div><div class="ln-thin"></div><div class="dots"><span></span><span></span></div>`;
  } else if(type==='repeatEnd'){
    div.innerHTML = `<div class="dots"><span></span><span></span></div><div class="ln-thin"></div><div class="ln-thick"></div>`;
  } else if(type==='end'){
    div.innerHTML = `<div class="ln-thin"></div><div class="ln-thin"></div>`;
  } else {
    div.innerHTML = `<div class="ln-thin"></div>`;
  }
  return div;
}

function renderLabelSlot(idx, allow){
  const div = document.createElement('div');
  div.className='label-slot';
  const b = song.borders[idx];
  if(allow && b && b.label){
    div.innerHTML = `<span class="sec-badge">${b.label}</span>`;
  }
  return div;
}

function renderTimeSigEl(showDigits){
  const div = document.createElement('div');
  div.className='time-sig';
  if(showDigits){
    div.innerHTML = `<div class="num">${song.timeSig.num}</div><div class="den">${song.timeSig.den}</div>`;
    div.onclick=(e)=>{ e.stopPropagation(); openTimeSigEdit(); };
  }
  return div;
}

function makeAddBarBtn(){
  const addBtn = document.createElement('div');
  addBtn.className='add-bar';
  addBtn.textContent='+';
  addBtn.onclick=()=>{
    pushSongUndo();
    const lastIdx = song.items.length;
    const wasEnd = song.borders[lastIdx].type === 'end';
    if(wasEnd) song.borders[lastIdx].type = 'normal';
    song.items.push(bar([]));
    song.borders.push({type: wasEnd ? 'end' : 'normal', label:null});
    render();
  };
  return addBtn;
}

function render(){
  const inner = document.getElementById('chartInner');
  inner.querySelectorAll('.song-block').forEach(e=>e.remove());
  const canvas = document.getElementById('inkCanvas');

  const rows = chunkRows(song.items, BARS_PER_ROW);
  const songBlock = document.createElement('div');
  songBlock.className='song-block';

  let lastRowBarRow = null;
  let globalIdx = 0;

  rows.forEach((row, rIdx)=>{
    const lane = document.createElement('div');
    lane.className='write-lane';
    songBlock.appendChild(lane);

    const rowStart = globalIdx;
    const isLastRow = (rIdx === rows.length-1);
    let needsLabelRow = false;
    for(let k=rowStart;k<rowStart+row.length;k++){
      if(song.borders[k] && song.borders[k].label){ needsLabelRow=true; break; }
    }
    if(!needsLabelRow && isLastRow && song.borders[rowStart+row.length] && song.borders[rowStart+row.length].label){
      needsLabelRow = true;
    }
    if(needsLabelRow){
      const labelRow = document.createElement('div');
      labelRow.className='label-row';
      const tsSpacer=document.createElement('div');
      tsSpacer.className='ts-spacer';
      labelRow.appendChild(tsSpacer);
      let li = rowStart;
      row.forEach(()=>{
        labelRow.appendChild(renderLabelSlot(li, true));
        li++;
        const barSpacer=document.createElement('div');
        barSpacer.className='bar-spacer';
        labelRow.appendChild(barSpacer);
      });
      labelRow.appendChild(renderLabelSlot(li, isLastRow));
      songBlock.appendChild(labelRow);
    }

    const barRow = document.createElement('div');
    barRow.className='bar-row';
    barRow.appendChild(renderTimeSigEl(rIdx===0));

    row.forEach(item=>{
      barRow.appendChild(renderBorderEl(song.borders[globalIdx] || {type:'normal',label:null}, globalIdx));
      barRow.appendChild(renderBarEl(item));
      globalIdx++;
    });
    barRow.appendChild(renderBorderEl(song.borders[globalIdx] || {type:'normal',label:null}, globalIdx));

    songBlock.appendChild(barRow);
    lastRowBarRow = barRow;
  });

  const lastRow = rows[rows.length-1];
  if(lastRow.length < BARS_PER_ROW){
    lastRowBarRow.appendChild(makeAddBarBtn());
  } else {
    const extraRow = document.createElement('div');
    extraRow.className='bar-row';
    extraRow.appendChild(makeAddBarBtn());
    songBlock.appendChild(extraRow);
  }

  inner.appendChild(songBlock);
  inner.appendChild(canvas);
  requestAnimationFrame(resizeCanvasPreserving);
}

/* ============ Bar content (chord / % / rest / half-rest) ============ */
function setBarKind(barId, kind){
  pushSongUndo();
  const b = findBarById(barId);
  if(!b) return closeSheet();
  b.kind=kind; b.chords=[];
  closeSheet();
  render();
}
function setHalfRest(barId){
  pushSongUndo();
  const b = findBarById(barId);
  if(!b) return closeSheet();
  b.kind='chords';
  if(pickerTarget.mode==='edit'){
    const c = b.chords.find(c=>c.beat===pickerTarget.beat);
    if(c){ c.rest=true; delete c.root; delete c.quality; }
  } else {
    addChordWithReflow(b, {rest:true});
  }
  closeSheet();
  render();
}
function duplicateBar(barId){
  pushSongUndo();
  const idx = song.items.findIndex(it=>it.id===barId);
  if(idx<0) return;
  const original = song.items[idx];
  const copy = bar(original.chords.map(c=>({...c})));
  copy.kind = original.kind;
  song.items.splice(idx+1, 0, copy);
  song.borders.splice(idx+1, 0, {type:'normal', label:null});
  closeSheet();
  render();
}
function deleteBar(barId){
  pushSongUndo();
  const idx = song.items.findIndex(it=>it.id===barId);
  if(idx<0) return;
  if(song.items.length===1){
    song.items[0] = bar([]);
    closeSheet();
    render();
    return;
  }
  const removed = song.borders[idx+1];
  const kept = song.borders[idx];
  if(kept.type==='normal' && removed.type!=='normal') kept.type = removed.type;
  if(!kept.label && removed.label) kept.label = removed.label;
  song.items.splice(idx,1);
  song.borders.splice(idx+1,1);
  closeSheet();
  render();
}

/* ============ Chord picker ============ */
let pickerTarget = null;
let pickerRoot = null;
let pickerWholeBarOptions = false;

function handleBarTap(item, beatIdx){
  if(mode!=='chords') return;
  if(item.kind!=='chords' || item.chords.length===0){
    pickerTarget = {barId:item.id, mode:'add'};
    pickerRoot = null;
    pickerWholeBarOptions = true;
    openStep1();
    return;
  }
  pickerWholeBarOptions = false;
  const existing = item.chords.find(c=>c.beat===beatIdx);
  if(existing){
    pickerTarget = {barId:item.id, mode:'edit', beat:beatIdx};
    if(existing.rest){ pickerRoot=null; openStep1(); }
    else { pickerRoot = existing.root; openStep2(); }
  } else {
    pickerTarget = {barId:item.id, mode:'add'};
    pickerRoot = null;
    openStep1();
  }
}

function openStep1(){
  const wholeBarBlock = pickerWholeBarOptions ? `

    <div class="wholebar-grid">

    </div>
  ` : '';
  showSheet(`
    <div class="sheet-header"><span>Choose root</span><button onclick="closeSheet()">✕</button></div>
    <div class="root-grid">
      ${ROOTS.map(r=>`<button onclick="pickRoot('${r}')">${rootHtml(r)}</button>`).join('')}
      <button class="icon-btn" onclick="setHalfRest('${pickerTarget.barId}')">${halfRestSvg(20)}</button>
    </div>
    ${wholeBarBlock}
    <div class="sheet-actions">
      <button style="background:#f0eee7;color:#6b6a66;" onclick="clearChordSlot()">Clear</button>
      <button style="background:#eef1f6;color:#3a6fc4;" onclick="duplicateBar('${pickerTarget.barId}')">Duplicate Bar</button>
      <button style="background:#fbeceb;color:#c0453f;" onclick="deleteBar('${pickerTarget.barId}')">Delete Bar</button>
    </div>

}
function pickRoot(r){ pickerRoot=r; openStep2(); }

function openStep2(){
  showSheet(`
    <div class="sheet-header">
      <button onclick="openStep1()">‹</button>
      <span>${rootHtml(pickerRoot)} — quality</span>
      <button onclick="closeSheet()">✕</button>

      <button style="background:#fbeceb;color:#c0453f;" onclick="deleteBar('${pickerTarget.barId}')">Delete Bar</button>

  `);

function pickQuality(qid){
  pushSongUndo();
  const b = findBarById(pickerTarget.barId);
  if(!b) return closeSheet();
  b.kind = 'chords';
  if(pickerTarget.mode==='edit'){
    const c = b.chords.find(c=>c.beat===pickerTarget.beat);
    if(c){ c.root=pickerRoot; c.quality=qid; delete c.rest; }
  } else {
    addChordWithReflow(b, {root:pickerRoot, quality:qid});
  }
  closeSheet();
  render();
}
function clearChordSlot(){
  if(pickerTarget.mode!=='edit'){ closeSheet(); return; }
  pushSongUndo();
  const b = findBarById(pickerTarget.barId);
  if(b){
    const idx = b.chords.findIndex(c=>c.beat===pickerTarget.beat);
    if(idx>=0){
      b.chords.splice(idx,1);
      reflowBeats(b);

  }
  closeSheet();
  render();

/* ============ Chord drag & drop (reposition within a bar) ============ */
let chordDrag = null;
let suppressNextClick = false;

function beatFromClientX(clientX, rect){
  let rel = (clientX - rect.left) / rect.width;
  rel = Math.max(0, Math.min(0.999, rel));
  return Math.floor(rel*4);
}
function clearBeatHighlight(){
  document.querySelectorAll('.slot.drop-target').forEach(el=>el.classList.remove('drop-target'));
  document.querySelectorAll('.slot.drag-source').forEach(el=>el.classList.remove('drag-source'));
}
function highlightBeatTarget(targetBeat){
  clearBeatHighlight();
  const slots = chordDrag.barEl.querySelectorAll('.slot');
  if(slots[targetBeat]) slots[targetBeat].classList.add('drop-target');
  if(slots[chordDrag.fromBeat]) slots[chordDrag.fromBeat].classList.add('drag-source');
}

function slotPointerDown(e, item, beatIdx, barEl){
  if(mode!=='chords') return;
  const rect = barEl.getBoundingClientRect();
  chordDrag = {
    barId:item.id,
    fromBeat:beatIdx,
    targetBeat:beatIdx,
    startX:e.clientX,
    startY:e.clientY,
    dragging:false,
    rect,
    barEl
  };
  window.addEventListener('pointermove', onChordDragMove);
  window.addEventListener('pointerup', onChordDragEnd);
}

function onChordDragMove(e){
  if(!chordDrag) return;
  const dx = e.clientX - chordDrag.startX;
  const dy = e.clientY - chordDrag.startY;

  if(!chordDrag.dragging){
    if(Math.abs(dy) > 8 && Math.abs(dy) > Math.abs(dx)){
      // predominantly vertical — this is a page scroll, not a chord drag. Bail out.
      window.removeEventListener('pointermove', onChordDragMove);
      window.removeEventListener('pointerup', onChordDragEnd);
      chordDrag = null;
      return;
    }
    if(Math.abs(dx) < 6) return;
    chordDrag.dragging = true;
    pushSongUndo();
    document.getElementById('chartScroll').classList.add('dragging-chord');
    highlightBeatTarget(chordDrag.targetBeat);
  }

  e.preventDefault();
  const beat = beatFromClientX(e.clientX, chordDrag.rect);
  if(beat !== chordDrag.targetBeat){
    chordDrag.targetBeat = beat;
    highlightBeatTarget(beat);
  }
}

function onChordDragEnd(){
  window.removeEventListener('pointermove', onChordDragMove);
  window.removeEventListener('pointerup', onChordDragEnd);
  document.getElementById('chartScroll').classList.remove('dragging-chord');
  clearBeatHighlight();
  if(!chordDrag){ return; }

  if(chordDrag.dragging){
    const b = findBarById(chordDrag.barId);
    const from = chordDrag.fromBeat;
    const to = chordDrag.targetBeat;
    if(b && from !== to){
      const moving = b.chords.find(c=>c.beat===from);
      const occupying = b.chords.find(c=>c.beat===to);
      if(moving){
        moving.beat = to;
        if(occupying){ occupying.beat = from; }
      }
    }
    render();
    suppressNextClick = true;
    setTimeout(()=>{ suppressNextClick=false; }, 60);
  }
  chordDrag = null;
}

/* ============ Ink canvas ============ */
let drawing=false;
let currentStroke=[];
const PEN_COLOR = '#25409e';

function resizeCanvasPreserving(){
  const canvas = document.getElementById('inkCanvas');
  const inner = document.getElementById('chartInner');
  const newW = inner.scrollWidth;
  const newH = inner.scrollHeight;
  const prevW = parseFloat(canvas.dataset.cssW||0);
  const prevH = parseFloat(canvas.dataset.cssH||0);
  if(newW===prevW && newH===prevH) return;

  const dpr = window.devicePixelRatio || 1;
  let snapshot = null;
  if(canvas.width>0 && canvas.height>0){
    snapshot = document.createElement('canvas');
    snapshot.width = canvas.width;
    snapshot.height = canvas.height;
    snapshot.getContext('2d').drawImage(canvas,0,0);
  }

  canvas.style.width = newW+'px';
  canvas.style.height = newH+'px';
  canvas.width = Math.round(newW*dpr);
  canvas.height = Math.round(newH*dpr);

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);

  if(snapshot){
    ctx.drawImage(snapshot, 0,0, snapshot.width, snapshot.height, 0,0, prevW||newW, prevH||newH);
  }

  canvas.dataset.cssW = newW;
  canvas.dataset.cssH = newH;
}

function getCanvasPoint(e){
  const canvas = document.getElementById('inkCanvas');
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return {x:cx, y:cy};
}

function startDraw(e){
  if(mode==='chords') return;
  pushInkUndo();
  drawing=true;
  currentStroke=[getCanvasPoint(e)];
  e.preventDefault();
}
function moveDraw(e){
  if(!drawing) return;
  const pt = getCanvasPoint(e);
  currentStroke.push(pt);
  const canvas = document.getElementById('inkCanvas');
  const ctx = canvas.getContext('2d');
  ctx.lineJoin='round'; ctx.lineCap='round';
  if(mode==='erase'){
    ctx.globalCompositeOperation='destination-out';
    ctx.shadowBlur=0;
    ctx.lineWidth=20;
  } else {
    ctx.globalCompositeOperation='source-over';
    ctx.lineWidth=2.6;
    ctx.strokeStyle=PEN_COLOR;
    ctx.shadowColor=PEN_COLOR;
    ctx.shadowBlur=0.6;
  }

  const n = currentStroke.length;
  if(n < 3){
    const p0 = currentStroke[0];
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(pt.x, pt.y);
    ctx.stroke();
  } else {
    const p0 = currentStroke[n-3];
    const p1 = currentStroke[n-2];
    const p2 = currentStroke[n-1];
    const mid1 = {x:(p0.x+p1.x)/2, y:(p0.y+p1.y)/2};
    const mid2 = {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2};
    ctx.beginPath();
    ctx.moveTo(mid1.x, mid1.y);
    ctx.quadraticCurveTo(p1.x, p1.y, mid2.x, mid2.y);
    ctx.stroke();
  }
  e.preventDefault();
}
function endDraw(){ drawing=false; currentStroke=[]; }

function clearInkRaw(){
  const canvas = document.getElementById('inkCanvas');
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width, canvas.height);
  ctx.restore();
  const dpr = window.devicePixelRatio||1;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
function clearInk(){
  pushInkUndo();
  clearInkRaw();
}

/* ============ Init ============ */
window.addEventListener('resize', ()=>requestAnimationFrame(resizeCanvasPreserving));

document.addEventListener('DOMContentLoaded', ()=>{
  const canvas = document.getElementById('inkCanvas');
  canvas.addEventListener('pointerdown', startDraw);
  canvas.addEventListener('pointermove', moveDraw);
  window.addEventListener('pointerup', endDraw);
  canvas.addEventListener('touchstart', startDraw, {passive:false});
  canvas.addEventListener('touchmove', moveDraw, {passive:false});
  window.addEventListener('touchend', endDraw);
  syncTitleDisplay();
  updateHeader();
  render();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
