<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lead Sheet Editor</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lead Sheets">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Kalam:wght@400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="welcomeScreen">
  <div class="welcome-card">
    <div class="app-glyph" id="welcomeGlyph"></div>
    <h1>Lead Sheet Editor</h1>
    <div class="welcome-field"><input type="email" id="welcomeEmail" placeholder="Email" autocomplete="email"></div>
    <div class="welcome-field"><input type="password" id="welcomePassword" placeholder="Password" autocomplete="current-password"></div>
    <button class="welcome-signin" onclick="attemptSignIn()">Sign In</button>
    <div class="welcome-divider"><span class="ln"></span><span>or</span><span class="ln"></span></div>
    <button class="welcome-guest" onclick="continueAsGuest()">Continue as Guest</button>
    <div class="welcome-msg" id="welcomeMsg"></div>
  </div>
</div>

<div id="app" class="hidden">

  <div class="topbar">
    <div class="back" onclick="showWelcome()" id="backIcon"></div>
    <div class="titlewrap" onclick="openTitleEdit()">
      <div class="title" id="titleText">Tutorial Blues</div>
      <div class="sub" id="subText">4/4 · F</div>
    </div>
    <div class="icon" onclick="undo()" id="topUndoIcon"></div>
  </div>

  <div id="onboardTip"></div>
  <div id="onboardArrow"></div>

  <div class="main-row">
    <div class="sidebar" id="sidebarToolbar"></div>

    <div class="chart-scroll" id="chartScroll">
      <div class="chart-card">
        <div class="sheet-title" id="sheetTitleText" onclick="openTitleEdit()">Tutorial Blues</div>
        <div class="sheet-composer" id="sheetComposerText" onclick="openTitleEdit()" style="display:none;"></div>
        <div id="chartInner">
          <canvas id="inkCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="info-panel" id="infoPanel"></div>
  </div>

  <div id="toast"></div>

  <div class="toolbar" id="bottomToolbar"></div>

  <input type="file" id="importFileInput" accept="application/json,.json" style="display:none;" onchange="handleImportFile(event)">
  <div id="backdrop" onclick="closeSheet()"></div>
  <div id="sheet"></div>
</div>

<script src="chart.js"></script>
<script src="app.js"></script>
</body>
</html>
